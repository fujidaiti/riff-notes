document.getElementById("btn-save").addEventListener("click", async () => {
  const json = JSON.stringify(serializeProject(project), null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const safe = (project.name || "score").trim().replace(/[\\/:*?"<>|]+/g, "_") || "score";
  const filename = safe + ".json";
  if (typeof window.showSaveFilePicker === "function") {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: filename,
        types: [{ description: "JSON", accept: { "application/json": [".json"] } }],
      });
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
    } catch (err) {
      if (err && err.name === "AbortError") return;
      alert("Failed to save JSON: " + err.message);
    }
  } else {
    triggerDownload(blob, filename);
  }
});
document.getElementById("btn-load").addEventListener("click", () => document.getElementById("file-load").click());
document.getElementById("file-load").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const fr = new FileReader();
  fr.onload = () => {
    try {
      const parsed = JSON.parse(fr.result);
      if (parsed && parsed.version !== 1 && parsed.version !== 2 && parsed.version !== 3 && parsed.version !== 4 && parsed.version !== 5 && parsed.version !== SCHEMA_VERSION) {
        throw new Error(`Unsupported schema version ${parsed.version} (expected ${SCHEMA_VERSION})`);
      }
      const obj = deserializeProject(parsed);
      if (!obj) throw new Error("Invalid format");
      project.name = obj.name || "";
      project.sheets = obj.sheets;
      activeSheetId = project.sheets[0]?.id ?? null;
      lastFocusedSheetId = activeSheetId;
      syncProjectNameInput();
      renderAll();
    } catch (err) {
      alert("Failed to load JSON: " + err.message);
    }
  };
  fr.readAsText(file);
  e.target.value = "";
});


function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ---------- Playback (per sheet, exclusive) ----------
let masterGain = null;
let masterVolume = 1.0; // 0..1, runtime-only (not persisted)
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (!masterGain) {
    masterGain = audioCtx.createGain();
    masterGain.gain.value = masterVolume;
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
}

function teardownPlayback() {
  for (const fn of activeOscillators) fn();
  activeOscillators = [];
  if (playStopTimer) { clearTimeout(playStopTimer); playStopTimer = null; }
  if (playbackRaf) { cancelAnimationFrame(playbackRaf); playbackRaf = null; }
}

function stopPlayback() {
  // Full stop: clear playing and paused state. sheet.playStart unchanged.
  teardownPlayback();
  playingSheetId = null;
  pausedSheetId = null;
  pausedStep = 0;
  renderAll();
}

const playbackEndedNaturally = stopPlayback;

function pausePlayback() {
  if (!playingSheetId || !audioCtx) return;
  const elapsed = audioCtx.currentTime - playbackT0;
  const step = playbackStartStep + Math.max(0, elapsed) / playbackSecPerStep;
  const clamped = Math.max(0, Math.min(playbackTotalSteps - 0.0001, step));
  teardownPlayback();
  pausedSheetId = playingSheetId;
  pausedStep = clamped;
  playingSheetId = null;
  renderAll();
}

function resumePlayback(sheet) {
  const fromStep = Math.floor(pausedStep);
  pausedSheetId = null;
  pausedStep = 0;
  playSheet(sheet, fromStep);
}

let noiseBuffer = null;
function getNoiseBuffer() {
  if (noiseBuffer && noiseBuffer.sampleRate === audioCtx.sampleRate) return noiseBuffer;
  const len = Math.floor(audioCtx.sampleRate * 0.5);
  noiseBuffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const ch = noiseBuffer.getChannelData(0);
  for (let i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
  return noiseBuffer;
}

function scheduleDrum(when, durSec, drumKey, vel) {
  const dest = masterGain || audioCtx.destination;
  const peak = VEL_GAIN[vel];
  const stops = [];
  if (drumKey === "bass") {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(180, when);
    osc.frequency.exponentialRampToValueAtTime(80, when + 0.08);
    const bassPeak = Math.min(1.0, peak * 1.8);
    gain.gain.setValueAtTime(0, when);
    gain.gain.linearRampToValueAtTime(bassPeak, when + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.0001, when + 0.18);
    osc.connect(gain).connect(dest);
    osc.start(when);
    osc.stop(when + 0.22);
    stops.push(() => { try { osc.stop(); osc.disconnect(); gain.disconnect(); } catch {} });
  } else if (drumKey === "snare") {
    const src = audioCtx.createBufferSource();
    src.buffer = getNoiseBuffer();
    const bp = audioCtx.createBiquadFilter();
    bp.type = "bandpass";
    bp.frequency.value = 1700;
    bp.Q.value = 0.9;
    const ng = audioCtx.createGain();
    ng.gain.setValueAtTime(0, when);
    ng.gain.linearRampToValueAtTime(peak * 0.9, when + 0.003);
    ng.gain.exponentialRampToValueAtTime(0.0001, when + 0.14);
    src.connect(bp).connect(ng).connect(dest);
    src.start(when);
    src.stop(when + 0.18);
    const body = audioCtx.createOscillator();
    const bg = audioCtx.createGain();
    body.type = "triangle";
    body.frequency.setValueAtTime(220, when);
    body.frequency.exponentialRampToValueAtTime(140, when + 0.05);
    bg.gain.setValueAtTime(0, when);
    bg.gain.linearRampToValueAtTime(peak * 0.4, when + 0.003);
    bg.gain.exponentialRampToValueAtTime(0.0001, when + 0.09);
    body.connect(bg).connect(dest);
    body.start(when);
    body.stop(when + 0.12);
    stops.push(() => { try { src.stop(); src.disconnect(); bp.disconnect(); ng.disconnect(); body.stop(); body.disconnect(); bg.disconnect(); } catch {} });
  } else {
    // hihat
    const src = audioCtx.createBufferSource();
    src.buffer = getNoiseBuffer();
    const hp = audioCtx.createBiquadFilter();
    hp.type = "highpass";
    hp.frequency.value = 7000;
    const ng = audioCtx.createGain();
    const decay = Math.max(0.04, Math.min(0.25, durSec * 0.6));
    ng.gain.setValueAtTime(0, when);
    ng.gain.linearRampToValueAtTime(peak * 0.7, when + 0.002);
    ng.gain.exponentialRampToValueAtTime(0.0001, when + decay);
    src.connect(hp).connect(ng).connect(dest);
    src.start(when);
    src.stop(when + decay + 0.02);
    stops.push(() => { try { src.stop(); src.disconnect(); hp.disconnect(); ng.disconnect(); } catch {} });
  }
  for (const s of stops) activeOscillators.push(s);
}

function scheduleNote(when, durSec, midi, vel) {
  const freq = 440 * Math.pow(2, (midi - 69) / 12);
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "triangle";
  osc.frequency.setValueAtTime(freq, when);
  const peak = VEL_GAIN[vel];
  gain.gain.setValueAtTime(0, when);
  gain.gain.linearRampToValueAtTime(peak, when + 0.005);
  gain.gain.setValueAtTime(peak, when + Math.max(0.01, durSec - 0.04));
  gain.gain.linearRampToValueAtTime(0, when + durSec);
  osc.connect(gain).connect(masterGain || audioCtx.destination);
  osc.start(when);
  osc.stop(when + durSec + 0.02);
  activeOscillators.push(() => { try { osc.stop(); osc.disconnect(); gain.disconnect(); } catch {} });
}

function playSheet(sheet, fromStep) {
  ensureAudio();
  // exclusive: stop any current playback (playing or paused)
  teardownPlayback();
  pausedSheetId = null;
  pausedStep = 0;
  playingSheetId = sheet.id;
  const secPerStep = 60 / sheet.bpm / 4;
  const totalSteps = sheet.bars.length * STEPS_PER_BAR;
  const wantedStart = (fromStep != null) ? fromStep : (sheet.playStart || 0);
  const startStep = Math.max(0, Math.min(totalSteps - 1, wantedStart));
  // Wrap to 0 if cursor is past the end
  const effectiveStart = startStep >= totalSteps ? 0 : startStep;
  const t0 = audioCtx.currentTime + 0.05;
  let lastEnd = t0;
  const partsById = {};
  for (const pt of sheet.parts) partsById[pt.id] = pt;
  const scheduleNoteAt = (n, bi) => {
    const absStart = bi * STEPS_PER_BAR + noteFracStart(n);
    if (absStart < effectiveStart) return;
    const start = t0 + (absStart - effectiveStart) * secPerStep;
    const dur = noteFracLength(n) * secPerStep * 0.95;
    const part = partsById[n.partId];
    if (part && part.type === "rhythm") {
      const rowIdx = part.hi - n.pitch;
      const key = RHYTHM_KEYS[rowIdx];
      if (key) scheduleDrum(start, dur, key, n.vel);
    } else {
      scheduleNote(start, dur, n.pitch, n.vel);
    }
    if (start + dur > lastEnd) lastEnd = start + dur;
  };
  sheet.bars.forEach((bar, bi) => {
    for (const n of bar.notes) scheduleNoteAt(n, bi);
    // Mirror source notes for each part this bar repeats.
    if (bar.repeats) {
      for (const partId of Object.keys(bar.repeats)) {
        const src = sheet.bars.find(b => b.id === bar.repeats[partId]);
        if (!src) continue;
        for (const n of src.notes) {
          if (n.partId !== partId) continue;
          scheduleNoteAt(n, bi);
        }
      }
    }
  });
  playbackT0 = t0;
  playbackStartStep = effectiveStart;
  playbackSecPerStep = secPerStep;
  playbackTotalSteps = totalSteps;
  const endStepTime = t0 + (totalSteps - effectiveStart) * secPerStep;
  const endTime = Math.max(lastEnd, endStepTime);
  const totalMs = Math.max(100, (endTime - audioCtx.currentTime) * 1000 + 100);
  const myId = sheet.id;
  playStopTimer = setTimeout(() => { if (playingSheetId === myId) playbackEndedNaturally(); }, totalMs);

  const tick = () => {
    if (playingSheetId !== sheet.id || !audioCtx) return;
    // Only animate DOM when the playing sheet is the visible tab; the
    // other tab's DOM has the same selectors and would otherwise animate too.
    if (activeSheetId === sheet.id) {
      const elapsed = audioCtx.currentTime - playbackT0;
      const cur = playbackStartStep + Math.max(0, elapsed) / playbackSecPerStep;
      if (cur >= playbackTotalSteps) {
        updatePlaybackPlayhead(playbackTotalSteps - 0.0001, sheet);
      } else {
        updatePlaybackPlayhead(cur, sheet);
      }
    }
    playbackRaf = requestAnimationFrame(tick);
  };
  renderAll();
  playbackRaf = requestAnimationFrame(tick);
}

// ---------- MIDI live recording ----------
function scheduleMetronomeClick(when, accent) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "square";
  osc.frequency.setValueAtTime(accent ? 1500 : 900, when);
  const peak = 0.18;
  gain.gain.setValueAtTime(0, when);
  gain.gain.linearRampToValueAtTime(peak, when + 0.002);
  gain.gain.exponentialRampToValueAtTime(0.0001, when + 0.05);
  osc.connect(gain).connect(masterGain || audioCtx.destination);
  osc.start(when);
  osc.stop(when + 0.07);
}

function currentRecordingStep() {
  const elapsed = (performance.now() - recordingT0) / 1000;
  return recordingStartStep + elapsed / recordingSecPerStep;
}

async function startRecording(sheet, part) {
  if (recordingState !== "idle") return;
  if (playingSheetId || pausedSheetId) stopPlayback();
  if (!navigator.requestMIDIAccess) {
    await alertAsync("Live MIDI recording requires a Chromium-based browser (Chrome, Edge, Opera).");
    return;
  }
  try {
    midiAccess = await navigator.requestMIDIAccess({ sysex: false });
  } catch (e) {
    await alertAsync("Could not access MIDI devices: " + (e && e.message ? e.message : e));
    return;
  }
  if (midiAccess.inputs.size === 0) {
    await alertAsync("No MIDI input devices detected. Connect a MIDI keyboard and try again.");
    return;
  }

  ensureAudio();

  const startStepWanted = sheet.playStart || 0;
  const totalSheetSteps = sheet.bars.length * STEPS_PER_BAR;
  const effectiveStart = startStepWanted >= totalSheetSteps ? 0 : startStepWanted;
  if (totalSheetSteps - effectiveStart <= 0) {
    await alertAsync("Nothing to record into — add a bar first.");
    return;
  }

  recordingUndoSnap = snapshotProject();
  recordingSheetId = sheet.id;
  recordingPartId = part.id;
  recordingStartStep = effectiveStart;
  recordingSecPerStep = 60 / sheet.bpm / 4;
  recordingTotalSteps = totalSheetSteps - effectiveStart;
  recordingHeld = new Map();
  recordingState = "count-in";

  // Subscribe to all MIDI inputs.
  midiInputDisposers = [];
  midiAccess.inputs.forEach(input => {
    const handler = onMidiMessage;
    input.addEventListener("midimessage", handler);
    midiInputDisposers.push(() => input.removeEventListener("midimessage", handler));
  });

  // Schedule 1-bar (4-beat) count-in clicks.
  const stepsPerBeat = 4;
  const beatSec = recordingSecPerStep * stepsPerBeat;
  const countInStart = audioCtx.currentTime + 0.05;
  for (let i = 0; i < 4; i++) {
    scheduleMetronomeClick(countInStart + i * beatSec, i === 0);
  }
  const countInDurationMs = beatSec * 4 * 1000;

  renderAll();

  recordingCountInTimer = setTimeout(() => {
    recordingCountInTimer = null;
    beginRecordingPhase(sheet);
  }, countInDurationMs);
}

function beginRecordingPhase(sheet) {
  if (recordingState !== "count-in") return;
  recordingState = "recording";
  recordingT0 = performance.now();
  // Schedule metronome clicks during recording — every beat from startStep onward.
  metronomeNextBeat = Math.ceil(recordingStartStep / 4) * 4;
  scheduleUpcomingMetronome();

  const tick = () => {
    if (recordingState !== "recording") return;
    const cur = currentRecordingStep();
    if (activeSheetId === sheet.id) {
      const clamped = Math.min(cur, recordingStartStep + recordingTotalSteps - 0.0001);
      updatePlaybackPlayhead(clamped, sheet);
    }
    scheduleUpcomingMetronome();
    growHeldNotes();
    if (cur >= recordingStartStep + recordingTotalSteps) {
      finishRecording("end");
      return;
    }
    recordingRaf = requestAnimationFrame(tick);
  };
  renderAll();
  recordingRaf = requestAnimationFrame(tick);
}

function scheduleUpcomingMetronome() {
  if (!audioCtx) return;
  const lookaheadSec = 0.25;
  const cur = currentRecordingStep();
  const horizon = cur + lookaheadSec / recordingSecPerStep;
  const endStep = recordingStartStep + recordingTotalSteps;
  while (metronomeNextBeat <= horizon && metronomeNextBeat < endStep) {
    const offsetSec = (metronomeNextBeat - cur) * recordingSecPerStep;
    const when = audioCtx.currentTime + Math.max(0, offsetSec);
    const accent = (metronomeNextBeat % STEPS_PER_BAR) === 0;
    scheduleMetronomeClick(when, accent);
    metronomeNextBeat += 4;
  }
}

function onMidiMessage(ev) {
  if (recordingState !== "recording") return; // ignore during count-in / idle
  const data = ev.data;
  if (!data || data.length < 2) return;
  const status = data[0] & 0xf0;
  const pitch = data[1];
  const vel = data.length > 2 ? data[2] : 0;
  if (status === 0x90 && vel > 0) {
    handleNoteOn(pitch, vel);
  } else if (status === 0x80 || (status === 0x90 && vel === 0)) {
    handleNoteOff(pitch);
  }
}

function handleNoteOn(pitch, midiVel) {
  const sheet = project.sheets.find(s => s.id === recordingSheetId);
  if (!sheet) return;
  const cur = currentRecordingStep();
  const endStep = recordingStartStep + recordingTotalSteps;
  let step = Math.round(cur);
  if (step < recordingStartStep) step = recordingStartStep;
  if (step >= endStep) step = endStep - 1;
  const velIdx = Math.max(0, Math.min(VEL_LABELS.length - 1, Math.round((midiVel - 1) / 126 * (VEL_LABELS.length - 1))));
  if (recordingHeld.has(pitch)) {
    // Duplicate noteOn while still held: finalize the previous note first.
    finalizeHeldNote(pitch, step);
  }
  const bi = Math.floor(step / STEPS_PER_BAR);
  if (bi < 0 || bi >= sheet.bars.length) return;
  if (isRepeatBarPart(sheet.bars[bi], recordingPartId)) return;
  const note = {
    id: uid(),
    partId: recordingPartId,
    pitch,
    start: step % STEPS_PER_BAR,
    length: 1,
    vel: velIdx,
    subOffset: 0,
    subLength: 0,
  };
  sheet.bars[bi].notes.push(note);
  recordingHeld.set(pitch, { note, bi, startStep: step });
  renderAll();
}

function handleNoteOff(pitch) {
  if (!recordingHeld.has(pitch)) return;
  const cur = currentRecordingStep();
  const endStep = recordingStartStep + recordingTotalSteps;
  let step = Math.round(cur);
  if (step > endStep) step = endStep;
  finalizeHeldNote(pitch, step);
}

function finalizeHeldNote(pitch, endStepAbs) {
  const entry = recordingHeld.get(pitch);
  if (!entry) return;
  recordingHeld.delete(pitch);
  updateHeldNoteLength(entry, endStepAbs);
}

function updateHeldNoteLength(entry, endStepAbs) {
  const sheet = project.sheets.find(s => s.id === recordingSheetId);
  if (!sheet) return;
  const totalSheetSteps = sheet.bars.length * STEPS_PER_BAR;
  const endCapped = Math.min(endStepAbs, totalSheetSteps);
  const maxLen = totalSheetSteps - entry.startStep;
  const newLen = Math.max(1, Math.min(endCapped - entry.startStep, maxLen));
  if (newLen === entry.note.length) return;
  entry.note.length = newLen;
  // Targeted DOM update — avoids a full renderAll per frame.
  const part = sheet.parts.find(p => p.id === entry.note.partId);
  if (!part) return;
  if (entry.note.pitch < part.lo || entry.note.pitch > part.hi) return; // out-of-range: not rendered
  const wrap = document.querySelector(
    `[data-sheet-id="${sheet.id}"] [data-part-id="${part.id}"] .grid-wrap[data-bar-index="${entry.bi}"]`
  );
  if (wrap) updateNoteDom2(wrap, entry.note, part);
}

function growHeldNotes() {
  if (recordingHeld.size === 0) return;
  const cur = currentRecordingStep();
  const endStep = recordingStartStep + recordingTotalSteps;
  const step = Math.min(Math.round(cur), endStep);
  for (const entry of recordingHeld.values()) {
    updateHeldNoteLength(entry, step);
  }
}

function finishRecording(reason) {
  if (recordingState === "idle") return;
  // Close any still-held notes at the current step (clamped to end).
  const endStep = recordingStartStep + recordingTotalSteps;
  let closeStep;
  if (recordingState === "recording") {
    const cur = currentRecordingStep();
    closeStep = Math.min(Math.round(cur), endStep);
  } else {
    // Stopped during count-in: no notes were recorded.
    closeStep = recordingStartStep;
  }
  for (const pitch of Array.from(recordingHeld.keys())) {
    finalizeHeldNote(pitch, closeStep);
  }
  if (recordingRaf) { cancelAnimationFrame(recordingRaf); recordingRaf = null; }
  if (recordingCountInTimer) { clearTimeout(recordingCountInTimer); recordingCountInTimer = null; }
  for (const dispose of midiInputDisposers) { try { dispose(); } catch {} }
  midiInputDisposers = [];
  // Commit the whole recording as one undo entry.
  if (recordingUndoSnap) {
    commitUndoSnapshot(recordingUndoSnap);
    recordingUndoSnap = null;
  }
  recordingSheetId = null;
  recordingPartId = null;
  recordingState = "idle";
  recordingHeld = new Map();
  renderAll();
  persist();
}

// ---------- MIDI export (per sheet) ----------
function writeVarLen(n) {
  const bytes = [n & 0x7f];
  n >>= 7;
  while (n > 0) { bytes.unshift((n & 0x7f) | 0x80); n >>= 7; }
  return bytes;
}
function strBytes(s) { return Array.from(new TextEncoder().encode(s)); }

function buildSheetTrack(sheet, part, isFirstTrack) {
  const events = [];
  if (isFirstTrack) {
    const mpq = Math.round(60000000 / sheet.bpm);
    events.push({ tick: 0, order: 0, bytes: [0xff, 0x51, 0x03, (mpq >> 16) & 0xff, (mpq >> 8) & 0xff, mpq & 0xff] });
  }
  const nameBytes = strBytes(part.name);
  events.push({ tick: 0, order: 0, bytes: [0xff, 0x03, nameBytes.length, ...nameBytes] });
  const emitNote = (n, bi) => {
    const onTick = Math.round((bi * STEPS_PER_BAR + noteFracStart(n)) * TICKS_PER_STEP);
    const offTick = Math.round((bi * STEPS_PER_BAR + noteFracStart(n) + noteFracLength(n)) * TICKS_PER_STEP);
    events.push({ tick: onTick, order: 1, bytes: [0x90, n.pitch, VEL_MIDI[n.vel]] });
    events.push({ tick: offTick, order: 0, bytes: [0x80, n.pitch, 0] });
  };
  sheet.bars.forEach((bar, bi) => {
    for (const n of bar.notes) {
      if (n.partId !== part.id) continue;
      emitNote(n, bi);
    }
    const srcId = bar.repeats && bar.repeats[part.id];
    if (srcId) {
      const src = sheet.bars.find(b => b.id === srcId);
      if (src) {
        for (const n of src.notes) {
          if (n.partId !== part.id) continue;
          emitNote(n, bi);
        }
      }
    }
  });
  events.sort((a, b) => a.tick - b.tick || a.order - b.order);
  const lastTick = events.length ? events[events.length - 1].tick : 0;
  events.push({ tick: lastTick, order: 2, bytes: [0xff, 0x2f, 0x00] });
  const out = [];
  let prev = 0;
  for (const e of events) {
    const delta = e.tick - prev;
    prev = e.tick;
    out.push(...writeVarLen(delta), ...e.bytes);
  }
  return out;
}

function exportSheetMidi(sheet) {
  const tracks = sheet.parts.map((p, i) => buildSheetTrack(sheet, p, i === 0));
  const numTracks = tracks.length;
  const header = [
    0x4d, 0x54, 0x68, 0x64, 0, 0, 0, 6, 0, 1,
    (numTracks >> 8) & 0xff, numTracks & 0xff,
    (TICKS_PER_QUARTER >> 8) & 0xff, TICKS_PER_QUARTER & 0xff,
  ];
  const bytes = [...header];
  for (const t of tracks) {
    bytes.push(0x4d, 0x54, 0x72, 0x6b);
    const len = t.length;
    bytes.push((len >> 24) & 0xff, (len >> 16) & 0xff, (len >> 8) & 0xff, len & 0xff);
    bytes.push(...t);
  }
  const blob = new Blob([new Uint8Array(bytes)], { type: "audio/midi" });
  const safe = (sheet.title || "sheet").replace(/[^a-z0-9_\-]+/gi, "_").slice(0, 40) || "sheet";
  triggerDownload(blob, `${safe}.mid`);
}

// ---------- Resize: re-flow bands ----------
let resizeTimer = null;
let lastN = barsPerBand();
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const n = barsPerBand();
    if (n !== lastN) { lastN = n; renderAll(); }
  }, 120);
});

// ---------- Init ----------
renderAll();

})();
</script>
