  const intervals = SCALES[sheet.scale.mode] || SCALES.major;
  return new Set(intervals.map(i => (i + sheet.scale.root) % 12));
}

function noteScaleClass(scaleSet, part, pitch) {
  if (isRhythmPart(part)) return "";
  const pc = ((pitch % 12) + 12) % 12;
  if (scaleSet.has(pc)) return " in-scale";
  return "";
}

// ---------- DOM helpers ----------
function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === "class") e.className = attrs[k];
    else if (k === "style") e.style.cssText = attrs[k];
    else if (k.startsWith("on") && typeof attrs[k] === "function") e.addEventListener(k.slice(2), attrs[k]);
    else if (k in e) { try { e[k] = attrs[k]; } catch { e.setAttribute(k, attrs[k]); } }
    else e.setAttribute(k, attrs[k]);
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return e;
}

// ---------- Confirm ----------
const confirmDialog = document.getElementById("confirm-dialog");
const confirmMessage = document.getElementById("confirm-message");
const confirmYes = document.getElementById("confirm-yes");
const confirmNo = document.getElementById("confirm-no");
function confirmAsync(msg) {
  return new Promise(resolve => {
    confirmMessage.textContent = msg;
    const onYes = () => { cleanup(); resolve(true); };
    const onNo  = () => { cleanup(); resolve(false); };
    const cleanup = () => {
      confirmYes.removeEventListener("click", onYes);
      confirmNo.removeEventListener("click", onNo);
      confirmDialog.close();
    };
    confirmYes.addEventListener("click", onYes);
    confirmNo.addEventListener("click", onNo);
    confirmDialog.showModal();
  });
}

// ---------- Alert ----------
const alertDialog = document.getElementById("alert-dialog");
const alertMessage = document.getElementById("alert-message");
const alertOk = document.getElementById("alert-ok");
function alertAsync(msg) {
  return new Promise(resolve => {
    alertMessage.textContent = msg;
    const onOk = () => { alertOk.removeEventListener("click", onOk); alertDialog.close(); resolve(); };
    alertOk.addEventListener("click", onOk);
    alertDialog.showModal();
  });
}

// ---------- Custom context menu ----------
const ctxMenuEl = document.getElementById("ctx-menu");
document.addEventListener("contextmenu", (ev) => { ev.preventDefault(); });

function openContextMenu(x, y, items) {
  ctxMenuEl.innerHTML = "";
  items.forEach(it => {
    if (it.sep) { ctxMenuEl.appendChild(el("div", { class: "ctx-sep" })); return; }
    const node = el("div", { class: "ctx-item" }, it.label);
    node.addEventListener("click", () => {
      closeContextMenu();
      try { it.onClick(); } catch (e) { console.error(e); }
    });
    ctxMenuEl.appendChild(node);
  });
  ctxMenuEl.style.display = "block";
  // Clamp inside viewport
  const w = ctxMenuEl.offsetWidth, h = ctxMenuEl.offsetHeight;
  let nx = x, ny = y;
  if (nx + w > window.innerWidth - 4) nx = Math.max(4, window.innerWidth - w - 4);
  if (ny + h > window.innerHeight - 4) ny = Math.max(4, window.innerHeight - h - 4);
  ctxMenuEl.style.left = nx + "px";
  ctxMenuEl.style.top = ny + "px";
}
function closeContextMenu() {
  ctxMenuEl.style.display = "none";
  ctxMenuEl.innerHTML = "";
}
document.addEventListener("pointerdown", (ev) => {
  if (ctxMenuEl.style.display === "block" && !ctxMenuEl.contains(ev.target)) closeContextMenu();
}, true);
document.addEventListener("keydown", (ev) => {
  if (ev.key === "Escape" && ctxMenuEl.style.display === "block") closeContextMenu();
});
window.addEventListener("scroll", closeContextMenu, true);
window.addEventListener("blur", closeContextMenu);

// ---------- Annotation dialog ----------
const annotationDialog = document.getElementById("annotation-dialog");
const annotationTextEl = document.getElementById("annotation-text");
const annotationTitleEl = document.getElementById("annotation-title");
const annotationSaveBtn = document.getElementById("annotation-save");
const annotationCancelBtn = document.getElementById("annotation-cancel");
const annotationDeleteBtn = document.getElementById("annotation-delete");

function editAnnotation({ initialText = "", isEdit = false } = {}) {
  return new Promise(resolve => {
    annotationTitleEl.textContent = isEdit ? "Edit annotation" : "New annotation";
    annotationTextEl.value = initialText;
    annotationDeleteBtn.style.display = isEdit ? "inline-block" : "none";
    const onSave = () => {
      const text = annotationTextEl.value;
      if (!text.trim()) return; // require non-empty
      cleanup(); resolve({ action: "save", text });
    };
    const onCancel = () => { cleanup(); resolve({ action: "cancel" }); };
    const onDelete = () => { cleanup(); resolve({ action: "delete" }); };
    const onKey = (e) => { if (e.key === "Escape") { e.preventDefault(); onCancel(); } };
    const cleanup = () => {
      annotationSaveBtn.removeEventListener("click", onSave);
      annotationCancelBtn.removeEventListener("click", onCancel);
      annotationDeleteBtn.removeEventListener("click", onDelete);
      annotationDialog.removeEventListener("keydown", onKey);
      annotationDialog.close();
    };
    annotationSaveBtn.addEventListener("click", onSave);
    annotationCancelBtn.addEventListener("click", onCancel);
    annotationDeleteBtn.addEventListener("click", onDelete);
    annotationDialog.addEventListener("keydown", onKey);
    annotationDialog.showModal();
    setTimeout(() => annotationTextEl.focus(), 0);
  });
}

// ---------- Annotation operations ----------
function annotationsContaining(sheet, noteId) {
  return (sheet.annotations || []).filter(a => a.noteIds.includes(noteId));
}

async function createAnnotation(sheet, noteIds) {
  if (!noteIds || noteIds.length === 0) return;
  const res = await editAnnotation({ isEdit: false });
  if (res.action !== "save") return;
  sheet.annotations.push({ id: uid(), text: res.text, noteIds: [...noteIds], shrunkWidth: ANNOT_DEFAULT_SHRUNK_WIDTH, manualPlacement: null });
  renderAll();
  persist();
}

async function editAnnotationOnSheet(sheet, annotationId) {
  const a = sheet.annotations.find(x => x.id === annotationId);
  if (!a) return;
  const res = await editAnnotation({ initialText: a.text, isEdit: true });
  if (res.action === "save") {
    a.text = res.text;
    renderAll();
    persist();
  } else if (res.action === "delete") {
    sheet.annotations = sheet.annotations.filter(x => x.id !== annotationId);
    renderAll();
    persist();
  }
}

function deleteAnnotation(sheet, annotationId) {
  sheet.annotations = sheet.annotations.filter(x => x.id !== annotationId);
  renderAll();
  persist();
}

function openNoteContextMenu(ev, sheet, note) {
  // If right-clicked note isn't in the current selection, replace selection.
  if (!sheet.selectedNoteIds.has(note.id)) {
    setSingleSelection(sheet, note.id);
    renderAll();
  }
  const existing = annotationsContaining(sheet, note.id);
  const items = [];
  existing.forEach(a => {
    const preview = a.text.replace(/\s+/g, " ").slice(0, 16);
    items.push({
      label: `Edit "${preview}${a.text.length > 16 ? "…" : ""}"`,
      onClick: () => editAnnotationOnSheet(sheet, a.id),
    });
  });
  if (existing.length > 0) items.push({ sep: true });
  items.push({
    label: "Annotate",
    onClick: () => createAnnotation(sheet, [...sheet.selectedNoteIds]),
  });
  openContextMenu(ev.clientX, ev.clientY, items);
}

// ---------- Rendering ----------
const sheetsEl = document.getElementById("sheets");
const tabstripEl = document.getElementById("tabstrip");

function getCellW() { return parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--cell-w")); }
function getCellH() { return parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--cell-h")); }
function noteWidthPx(length, cellW) { return length * cellW + 1; }
// Absolute fractional step position of a note, including its syncopation sub-offset.
function noteFracStart(n) { return n.start + (n.subOffset || 0) / SUB_PER_STEP; }
// Fractional length in steps (1 step = SUB_PER_STEP sub-steps).
function noteFracLength(n) { return n.length + (n.subLength || 0) / SUB_PER_STEP; }
// Shift a note's absolute position by `delta` sub-steps; clamps so the note
// never crosses the sheet's first/last absolute sub-position. Returns true
// iff the note actually moved.
function shiftNoteSubOffset(sheet, note, delta) {
  const totalSheetSub = totalSteps(sheet) * SUB_PER_STEP;
  let absSub = note.start * SUB_PER_STEP + (note.subOffset || 0);
  const lenSub = note.length * SUB_PER_STEP + (note.subLength || 0);
  const maxAbsSub = totalSheetSub - lenSub;
  let target = absSub + delta;
  if (target < 0) target = 0;
  if (target > maxAbsSub) target = maxAbsSub;
  if (target === absSub) return false;
  const newStart = Math.floor(target / SUB_PER_STEP);
  note.start = newStart;
  note.subOffset = target - newStart * SUB_PER_STEP;
  return true;
}

function ensureActiveSheet() {
  if (!project.sheets.find(s => s.id === activeSheetId)) {
    activeSheetId = project.sheets[0]?.id ?? null;
  }
}

function renderTabs() {
  tabstripEl.innerHTML = "";
  project.sheets.forEach((s, i) => {
    const playMark = playingSheetId === s.id
      ? el("span", { class: "tab-playing", title: "Playing" }, "▶")
      : (pausedSheetId === s.id ? el("span", { class: "tab-playing", title: "Paused" }, "⏸") : null);
    const tab = el("div", { class: "tab" + (s.id === activeSheetId ? " active" : "") },
      el("span", { class: "tab-label" }, s.title || `Sheet ${i + 1}`),
      playMark,
    );
    tab.dataset.sheetId = s.id;
    tab.addEventListener("click", () => {
      if (activeSheetId !== s.id) {
        activeSheetId = s.id;
        lastFocusedSheetId = s.id;
        renderAll();
      }
    });
    tabstripEl.appendChild(tab);
  });
  const addBtn = el("button", { class: "tab-add", title: "Add sheet" }, "+");
  addBtn.addEventListener("click", () => {
    const s = makeSheet(`Sheet ${project.sheets.length + 1}`);
    project.sheets.push(s);
    activeSheetId = s.id;
    lastFocusedSheetId = s.id;
    renderAll();
  });
  tabstripEl.appendChild(addBtn);
}

function renderAll() {
  ensureActiveSheet();
  renderTabs();
  sheetsEl.innerHTML = "";
  const idx = project.sheets.findIndex(s => s.id === activeSheetId);
  if (idx >= 0) {
    const sheet = project.sheets[idx];
    const sheetEl = renderSheet(sheet, idx);
    sheetsEl.appendChild(sheetEl);
    updatePlayheadDom(sheet);
    const bandsEl = sheetEl.querySelector(".bands");
    if (bandsEl) renderAnnotationOverlay(sheet, bandsEl);
  }
  persist();
}

// Position the ruler marker(s) at sheet.playStart and clear any grid lines.
function updatePlayheadDom(sheet) {
  const absStep = sheet.playStart || 0;
  const isPaused = pausedSheetId === sheet.id;
  const liveStep = isPaused ? pausedStep : -1;
  const cellW = getCellW();
  document.querySelectorAll(".ruler-track").forEach(track => {
    const start = track.querySelector(".playhead-marker.start");
    const live = track.querySelector(".playhead-marker.live");
    if (start) {
      start.style.display = "block";
      start.style.left = (absStep * cellW) + "px";
      start.classList.remove("dim");
    }
    if (live) {
      if (isPaused) {
        live.style.display = "block";
        live.style.left = (liveStep * cellW) + "px";
      } else {
        live.style.display = "none";
      }
    }
  });
  document.querySelectorAll(".grid-wrap").forEach(wrap => {
    const line = wrap.querySelector(".playhead-line");
    if (!line) return;
    if (isPaused) {
      line.classList.add("active");
      line.style.left = (liveStep * cellW) + "px";
    } else {
      line.classList.remove("active");
    }
  });
}

// Move playhead during playback: live marker follows current position,
// start marker remains visible (translucent) at sheet.playStart, plus a
// line in each part's grid at the current absolute step.
function updatePlaybackPlayhead(absStep, sheet) {
  const cellW = getCellW();
  const liveX = absStep * cellW;
  const startStep = sheet ? (sheet.playStart || 0) : -1;
  document.querySelectorAll(".ruler-track").forEach(track => {
    const start = track.querySelector(".playhead-marker.start");
    const live = track.querySelector(".playhead-marker.live");
    if (start) {
      if (startStep >= 0) {
        start.style.display = "block";
        start.style.left = (startStep * cellW) + "px";
        start.classList.add("dim");
      } else {
        start.style.display = "none";
      }
    }
    if (live) {
      live.style.display = "block";
      live.style.left = liveX + "px";
    }
  });
  document.querySelectorAll(".grid-wrap").forEach(wrap => {
    const line = wrap.querySelector(".playhead-line");
    if (!line) return;
    line.classList.add("active");
    line.style.left = liveX + "px";
  });
}

function renderSheet(sheet, idx) {
  const sheetEl = el("div", { class: "sheet" });
  sheetEl.dataset.sheetId = sheet.id;
  sheetEl.addEventListener("pointerdown", () => { lastFocusedSheetId = sheet.id; }, true);

  // Header
  const titleInput = el("input", {
    class: "sheet-title", type: "text", value: sheet.title,
    oninput: (e) => {
      sheet.title = e.target.value;
      const tab = tabstripEl.querySelector(`[data-sheet-id="${sheet.id}"] .tab-label`);
      if (tab) tab.textContent = sheet.title || `Sheet ${project.sheets.indexOf(sheet) + 1}`;
      persist();
    },
  });
  const bpmInput = el("input", {
    type: "number", min: 20, max: 300, value: sheet.bpm,
    oninput: (e) => { const v = parseInt(e.target.value, 10); if (Number.isFinite(v)) sheet.bpm = v; persist(); },
  });
  const rootSelect = el("select", { onchange: (e) => { sheet.scale.root = parseInt(e.target.value, 10); renderAll(); } });
  PITCH_NAMES.forEach((n, i) => rootSelect.appendChild(el("option", { value: String(i), selected: i === sheet.scale.root }, n)));
  const modeSelect = el("select", { onchange: (e) => { sheet.scale.mode = e.target.value; renderAll(); } });
  SCALE_OPTIONS.forEach(([v, label]) => modeSelect.appendChild(el("option", { value: v, selected: v === sheet.scale.mode }, label)));
  const displaySelect = el("select", { onchange: (e) => { sheet.pitchDisplay = e.target.value; renderAll(); } });
  [["note","Note"],["degree","Degree"]].forEach(([v,label]) =>
    displaySelect.appendChild(el("option", { value: v, selected: v === (sheet.pitchDisplay || "note") }, label)));

  const metaRow = el("div", { class: "sheet-meta-row" },
    titleInput,
    el("label", {}, "BPM ", bpmInput),
    el("label", {}, "Root ", rootSelect),
    el("label", {}, "Mode ", modeSelect),
    el("label", {}, "Display ", displaySelect),
  );

  const notesArea = el("textarea", {
    class: "sheet-notes", placeholder: "Notes for this sheet…",
    oninput: (e) => { sheet.notes = e.target.value; persist(); },
  }, sheet.notes || "");

  const isPlayingThis = playingSheetId === sheet.id;
  const isPausedThis = pausedSheetId === sheet.id;
  const playLabel = isPlayingThis ? "⏸ Pause" : (isPausedThis ? "▶ Resume" : "▶ Play");
  const isRecordingThis = recordingSheetId === sheet.id;
  const playBtn = el("button", {
    class: "play" + (isPlayingThis ? " playing" : ""),
    disabled: isRecordingThis,
  }, playLabel);
  playBtn.addEventListener("click", () => {
    if (recordingState !== "idle") return;
    if (playingSheetId === sheet.id) pausePlayback();
    else if (pausedSheetId === sheet.id) resumePlayback(sheet);
    else playSheet(sheet);
  });
  const stopBtn = el("button", { disabled: !isPlayingThis && !isPausedThis && !isRecordingThis }, "■ Stop");
  stopBtn.addEventListener("click", () => {
    if (isRecordingThis) { finishRecording("stop"); return; }
    if (playingSheetId === sheet.id || pausedSheetId === sheet.id) stopPlayback();
  });

  const actions = el("div", { class: "sheet-actions" },
    el("button", { onclick: () => { sheet.partsPanelOpen = !sheet.partsPanelOpen; renderAll(); } }, "Parts…"),
    el("button", { onclick: () => { sheet.barCount += 1; renderAll(); } }, "+ Bar"),
    playBtn, stopBtn,
    el("button", { onclick: () => exportSheetMidi(sheet) }, "Export MIDI"),
    el("button", {
      onclick: async () => {
        if (project.sheets.length <= 1) { alert("At least one sheet is required."); return; }
        if (await confirmAsync("Delete this sheet and all its notes?")) {
          if (playingSheetId === sheet.id) stopPlayback();
          const removedIdx = project.sheets.findIndex(s => s.id === sheet.id);
          project.sheets.splice(removedIdx, 1);
          // pick neighbor as new active
          const next = project.sheets[removedIdx] || project.sheets[removedIdx - 1] || project.sheets[0];
          activeSheetId = next ? next.id : null;
          lastFocusedSheetId = activeSheetId;
          renderAll();
        }
      },
    }, "✕ Sheet"),
  );

  const header = el("div", { class: "sheet-header" }, metaRow, notesArea, actions);
  sheetEl.appendChild(header);

  // Parts panel
  if (sheet.partsPanelOpen) sheetEl.appendChild(renderPartsPanel(sheet));

  // Bands
  sheetEl.appendChild(renderBands(sheet));
  return sheetEl;
}

function renderPartsPanel(sheet) {
  const panel = el("div", { class: "parts-panel" });
  panel.appendChild(el("h4", {}, "Parts for this sheet (visible pitch range; hidden notes still play and export)"));
  sheet.parts.forEach((p, idx) => {
    const rangeOrBadge = isRhythmPart(p)
      ? el("div", { class: "range-controls", style: "opacity:0.7" }, el("span", {}, "Rhythm (Hi-hat / Snare / Kick)"))
      : el("div", { class: "range-controls" },
          el("button", { title: "Lower the lowest visible pitch",  onclick: () => stepRange(p, "lo", -1) }, "−"),
          makePitchSelect(PIANO_MIN, p.hi - 1, p.lo, (v) => { p.lo = v; renderAll(); }, sheet),
          el("button", { title: "Raise the lowest visible pitch",  onclick: () => stepRange(p, "lo", +1) }, "+"),
          el("span", { class: "range-sep" }, "–"),
          el("button", { title: "Lower the highest visible pitch", onclick: () => stepRange(p, "hi", -1) }, "−"),
          makePitchSelect(p.lo + 1, PIANO_MAX, p.hi, (v) => { p.hi = v; renderAll(); }, sheet),
          el("button", { title: "Raise the highest visible pitch", onclick: () => stepRange(p, "hi", +1) }, "+"),
        );
    const row = el("div", { class: "part-row" },
      el("input", { type: "text", value: p.name, oninput: (e) => { p.name = e.target.value; updatePartSideLabels(sheet.id, p.id, p.name); } }),
      rangeOrBadge,
      el("button", { onclick: () => movePart(sheet, idx, -1) }, "▲"),
      el("button", { onclick: () => movePart(sheet, idx, +1) }, "▼"),
      el("button", { disabled: sheet.parts.length <= 1, onclick: () => deletePart(sheet, idx) }, "✕"),
    );
    panel.appendChild(row);
  });
  const addRow = el("div", { class: "part-row" },
    el("button", {
      onclick: () => { sheet.parts.push(makePart(`Part ${sheet.parts.length + 1}`)); renderAll(); },
    }, "+ Add Part"),
    el("button", {
      disabled: !!getRhythmPart(sheet),
      title: getRhythmPart(sheet) ? "This sheet already has a rhythm section" : "Add a rhythm section (Hi-hat / Snare / Kick)",
      onclick: () => { if (getRhythmPart(sheet)) return; sheet.parts.push(makeRhythmPart()); renderAll(); },
    }, "+ Add Rhythm Section"),
  );
  panel.appendChild(addRow);
  return panel;
}

function makePitchSelect(min, max, value, onChange, sheet) {
  const sel = el("select");
  for (let m = max; m >= min; m--) {
    const label = sheet ? pitchDisplayName(m, sheet, true) : pitchName(m);
    sel.appendChild(el("option", { value: String(m), selected: m === value }, label));
  }
  sel.addEventListener("change", (e) => onChange(parseInt(e.target.value, 10)));
  return sel;
}

function updatePartSideLabels(sheetId, partId, name) {
  document.querySelectorAll(`[data-sheet-id="${sheetId}"] [data-part-id="${partId}"] .part-side .part-name`).forEach(e => e.textContent = name);
}

function stepRange(part, which, delta) {
  if (which === "lo") {
    const next = part.lo + delta;
    if (next < PIANO_MIN || next >= part.hi) return;
    part.lo = next;
  } else {
    const next = part.hi + delta;
    if (next > PIANO_MAX || next <= part.lo) return;
    part.hi = next;
  }
  renderAll();
}

function movePart(sheet, idx, dir) {
  const j = idx + dir;
  if (j < 0 || j >= sheet.parts.length) return;
  const [p] = sheet.parts.splice(idx, 1);
  sheet.parts.splice(j, 0, p);
  renderAll();
}

async function deletePart(sheet, idx) {
  if (sheet.parts.length <= 1) return;
  const part = sheet.parts[idx];
  const count = part.notes.length;
  if (count > 0 && !(await confirmAsync(`Delete part "${part.name}" and ${count} note(s)?`))) return;
  pushUndo();
  const doomed = new Set(part.notes.map(n => n.id));
  sheet.parts.splice(idx, 1);
  if (doomed.size > 0 && sheet.annotations && sheet.annotations.length > 0) {
    sheet.annotations = sheet.annotations
      .map(a => ({ ...a, noteIds: a.noteIds.filter(id => !doomed.has(id)) }))
      .filter(a => a.noteIds.length > 0);
  }
  renderAll();
}

function renderBands(sheet) {
  const bandsEl = el("div", { class: "bands" });
  bandsEl.appendChild(renderBand(sheet));
  return bandsEl;
}

function renderBand(sheet) {
  const cellW = getCellW();
  const cellH = getCellH();
  const bandEl = el("div", { class: "band" });
  const barCount = Math.max(1, sheet.barCount | 0);
  const sheetSteps = barCount * STEPS_PER_BAR;

  // Opaque sticky rail spanning the full band height at the left edge so
  // the part-side column appears as one continuous floating bar while
  // horizontally scrolling.
  const railRows = 2 + sheet.parts.length;
  bandEl.appendChild(el("div", {
    class: "band-left-rail",
    style: `grid-row: 1 / span ${railRows};`,
  }));

  // Bar number row — one span per bar, sized to one bar's worth of cells.
  const numRow = el("div", { class: "band-bar-numbers" });
  numRow.style.gridRow = "1";
  numRow.style.gridTemplateColumns = `repeat(${barCount}, calc(var(--cell-w) * ${STEPS_PER_BAR}))`;
  for (let i = 0; i < barCount; i++) {
    numRow.appendChild(el("span", {}, String(i + 1)));
  }
  bandEl.appendChild(numRow);

  // Ruler row — a single contiguous clickable track spanning the whole sheet.
  const rulerRow = el("div", { class: "band-ruler" });
  rulerRow.style.gridRow = "2";
  const track = el("div", { class: "ruler-track" });
  track.style.width = `calc(var(--cell-w) * ${sheetSteps})`;
  const marker = el("div", { class: "playhead-marker start" });
  marker.style.display = "none";
  track.appendChild(marker);
  const liveMarker = el("div", { class: "playhead-marker live" });
  liveMarker.style.display = "none";
  track.appendChild(liveMarker);
  track.addEventListener("click", (ev) => {
    if (recordingState !== "idle") return;
    const rect = track.getBoundingClientRect();
    const cw = getCellW();
    let step = Math.floor((ev.clientX - rect.left) / cw);
    if (step < 0) step = 0;
    if (step > sheetSteps - 1) step = sheetSteps - 1;
    sheet.playStart = step;
    if (playingSheetId === sheet.id) {
      playSheet(sheet, step);
    } else if (pausedSheetId === sheet.id) {
      pausedStep = step;
      updatePlayheadDom(sheet);
    } else {
      updatePlayheadDom(sheet);
    }
  });
  rulerRow.appendChild(track);
  bandEl.appendChild(rulerRow);

  // Rows: one per part
  const scaleSet = inScaleSet(sheet);
  sheet.parts.forEach((part, partIdx) => {
    const partRow = el("div", { class: "band-row" });
    partRow.style.gridRow = String(3 + partIdx);
    partRow.dataset.partId = part.id;
    const isRecHere = recordingSheetId === sheet.id && recordingPartId === part.id;
    const rhythmPart = isRhythmPart(part);
    const side = el("div", { class: "part-side" },
      el("span", { class: "part-name" }, part.name),
    );
    if (!rhythmPart) {
      const recDisabled = recordingState !== "idle" && !isRecHere;
      const recBtn = el("button", {
        class: "part-rec-btn" + (isRecHere ? (recordingState === "count-in" ? " count-in" : " recording") : ""),
        title: isRecHere ? "Stop recording" : "Record MIDI input into this part",
        disabled: recDisabled,
      }, isRecHere ? "■" : "●");
      recBtn.addEventListener("click", (ev) => {
        ev.stopPropagation();
        if (isRecHere) finishRecording("stop");
        else startRecording(sheet, part);
      });
      side.appendChild(recBtn);
    }
    const numRows = part.hi - part.lo + 1;
    const gridRow = el("div", { class: "bar-grid" });
    const wrap = el("div", { class: "grid-wrap" });
    wrap.dataset.partId = part.id;
    wrap.dataset.partHi = String(part.hi);
    wrap.dataset.partLo = String(part.lo);
    wrap.dataset.partType = part.type || "pitched";
    wrap.style.width = `calc(var(--cell-w) * ${sheetSteps})`;
    wrap.style.height = `calc(var(--cell-h) * ${numRows})`;

    for (let i = 0; i < numRows; i++) {
      const rowEl = el("div", { class: "grid-row" });
      wrap.appendChild(rowEl);
    }
    gridRow.appendChild(wrap);

    const rhythm = isRhythmPart(part);
    for (const n of part.notes) {
      if (n.pitch < part.lo || n.pitch > part.hi) continue;
      let drumCls = "";
      if (rhythm) {
        const key = RHYTHM_KEYS[part.hi - n.pitch];
        if (key) drumCls = " drum-" + key;
      }
      const scaleCls = noteScaleClass(scaleSet, part, n.pitch);
      const noteEl = el("div", { class: "note" + drumCls + scaleCls + (isNoteSelected(sheet, n.id) ? " selected" : "") });
      noteEl.dataset.noteId = n.id;
      noteEl.dataset.vel = String(n.vel);
      noteEl.dataset.len = String(noteFracLength(n));
      const top = (part.hi - n.pitch) * cellH;
      noteEl.style.left = (noteFracStart(n) * cellW) + "px";
      noteEl.style.top = top + "px";
      noteEl.style.width = noteWidthPx(noteFracLength(n), cellW) + "px";
      noteEl.style.opacity = VEL_OPACITY[n.vel];
      noteEl.addEventListener("contextmenu", (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        openNoteContextMenu(ev, sheet, n);
      });
      wrap.appendChild(noteEl);
    }

    if (!rhythm) {
      const LABEL_W = 14, LABEL_H = 12;
      const wrapW = sheetSteps * cellW;
      const wrapH = numRows * cellH;
      const labeled = part.notes
        .filter(n => n.pitch >= part.lo && n.pitch <= part.hi)
        .map(n => ({
          n,
          x: noteFracStart(n) * cellW,
          y: (part.hi - n.pitch) * cellH,
          w: noteWidthPx(noteFracLength(n), cellW),
          h: cellH,
        }));
      labeled.sort((a, b) => a.x - b.x || b.n.pitch - a.n.pitch);
      const others = labeled.slice();
      // Label suppression (within this part, since `labeled` is built from `part.notes`):
      //   1. Proximity: suppress if the previous same-pitch note (labeled or not)
      //      is within 6 steps. Tracking "previous note" (not "previous labeled
      //      note") is what stops dense rows: a stream of Cs at <=6-step spacing
      //      keeps resetting the proximity window, so only the first C gets a label.
      //   2. Bar-width re-anchor: override rule 1 when the last *labeled* same-pitch
      //      note is more than STEPS_PER_BAR away (delta >= STEPS_PER_BAR + 1).
      //      This guarantees a recurring pattern like "C_C_C..." gets re-labeled
      //      about once per bar instead of only the first C of the whole sheet,
      //      so the eye can keep its bearings.
      // Iteration is `start` ascending (the existing x-sort is monotonic in start).
      // Suppressed notes still participate in `others` collision avoidance so that
      // labels we do render don't land on top of unlabeled notes.
      const lastStart = new Map();
      const lastLabeledStart = new Map();
      for (const r of labeled) {
        const prevStart = lastStart.get(r.n.pitch);
        const prevLabeled = lastLabeledStart.get(r.n.pitch);
        const proximitySuppress = prevStart !== undefined && r.n.start - prevStart <= 6;
        const reAnchor = prevLabeled === undefined || r.n.start - prevLabeled >= STEPS_PER_BAR + 1;
        lastStart.set(r.n.pitch, r.n.start);
        if (proximitySuppress && !reAnchor) continue;
        lastLabeledStart.set(r.n.pitch, r.n.start);
        const cxMid = r.x + r.w / 2;
        const cyMid = r.y + r.h / 2;
        const left = r.x - LABEL_W / 2;
        const right = r.x + r.w + LABEL_W / 2;
        const top = r.y - LABEL_H / 2;
        const bot = r.y + r.h + LABEL_H / 2;
        const candidates = [
          { cx: right, cy: top },     // top-right corner
          { cx: cxMid, cy: top },     // top-center
          { cx: right, cy: cyMid },   // right
          { cx: right, cy: bot },     // bottom-right corner
          { cx: cxMid, cy: bot },     // bottom-center
          { cx: left,  cy: bot },     // bottom-left corner
          { cx: left,  cy: cyMid },   // left
          { cx: left,  cy: top },     // top-left corner
          { cx: cxMid, cy: cyMid },   // center (fallback)
        ];
        let chosen = candidates[candidates.length - 1];
        for (const c of candidates) {
          const lx = c.cx - LABEL_W / 2;
          const ly = c.cy - LABEL_H / 2;
          if (lx < 0 || ly < 0 || lx + LABEL_W > wrapW || ly + LABEL_H > wrapH) continue;
          let hit = false;
          for (const o of others) {
            if (o === r) continue;
            if (lx < o.x + o.w && lx + LABEL_W > o.x && ly < o.y + o.h && ly + LABEL_H > o.y) { hit = true; break; }
          }
          if (!hit) { chosen = c; break; }
        }
        const labelEl = el("span", { class: "note-label" });
        labelEl.textContent = PITCH_NAMES[((r.n.pitch % 12) + 12) % 12];
        labelEl.style.left = (chosen.cx - LABEL_W / 2) + "px";
        labelEl.style.top = (chosen.cy - LABEL_H / 2) + "px";
        labelEl.style.width = LABEL_W + "px";
        labelEl.style.height = LABEL_H + "px";
        wrap.appendChild(labelEl);
      }
    }

    if (sheet.selectedCell &&
        sheet.selectedCell.partId === part.id &&
        sheet.selectedCell.pitch >= part.lo &&
        sheet.selectedCell.pitch <= part.hi &&
        sheet.selectedCell.step >= 0 &&
        sheet.selectedCell.step < sheetSteps) {
      const selEl = el("div", { class: "cell-selected" });
      selEl.style.left = (sheet.selectedCell.step * cellW) + "px";
      selEl.style.top = ((part.hi - sheet.selectedCell.pitch) * cellH) + "px";
      selEl.style.width = (cellW + 1) + "px";
      selEl.style.height = (cellH - 1) + "px";
      wrap.appendChild(selEl);
    }

    const playLine = el("div", { class: "playhead-line" });
    wrap.appendChild(playLine);

    wrap.addEventListener("pointerdown", (ev) => handlePointerDown(ev, sheet, part, wrap));

    partRow.appendChild(side);
    partRow.appendChild(gridRow);
    bandEl.appendChild(partRow);
  });
  return bandEl;
}

// ---------- Annotation overlay ----------
// Strategy hook: where to place the floating card. Receives the array of
// member descriptors (each with bands-relative x/y center and left/top/right/
// bottom rect). Returns { x, y, side } where side ∈ {"top","bottom","left",
// "right"} and the card is anchored just outside the member-bbox on that side,
// so expansion can grow away from the notes without overlapping them.
function computeCardPosition(members) {
  const GAP = 6;
  let left = Infinity, top = Infinity, right = -Infinity, bottom = -Infinity;
  let sy = 0;
  for (const m of members) {
    if (m.left   < left)   left   = m.left;
    if (m.top    < top)    top    = m.top;
    if (m.right  > right)  right  = m.right;
    if (m.bottom > bottom) bottom = m.bottom;
    sy += m.y;
  }
  const cy = sy / members.length;
  const midX = (left + right) / 2;
  const side = (cy - top) <= (bottom - cy) ? "top" : "bottom";
  if (side === "top") return { x: midX, y: top - GAP, side };
  return { x: midX, y: bottom + GAP, side };
}

function renderAnnotationOverlay(sheet, bandsEl) {
  // Tear down any previous overlay.
  const prev = bandsEl.querySelector(":scope > .annot-overlay");
  if (prev) prev.remove();
  if (!annotationsVisible) return;
  if (!sheet.annotations || sheet.annotations.length === 0) return;

  const bandsRect = bandsEl.getBoundingClientRect();

  // Look up each note's model and DOM element once.
  const noteById = new Map();
  for (const p of sheet.parts) for (const n of p.notes) noteById.set(n.id, n);
  const elByNoteId = new Map();
  bandsEl.querySelectorAll(".note").forEach(el => {
    const id = el.dataset.noteId;
    if (id) elByNoteId.set(id, el);
  });

  const overlay = el("div", { class: "annot-overlay" });
  const SVG_NS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(SVG_NS, "svg");
  overlay.appendChild(svg);

  // Per-annotation entries used for hover wiring.
  const entries = []; // { id, card, line|null, noteEls:[] }

  sheet.annotations.forEach(a => {
    const members = a.noteIds
      .map(id => ({ note: noteById.get(id), domEl: elByNoteId.get(id) }))
      .filter(m => m.note && m.domEl)
      .map(m => {
        const r = m.domEl.getBoundingClientRect();
        const left = r.left - bandsRect.left;
        const top = r.top - bandsRect.top;
        const right = r.right - bandsRect.left;
        const bottom = r.bottom - bandsRect.top;
        return {
          ...m,
          left, top, right, bottom,
          x: (left + right) / 2,
          y: (top + bottom) / 2,
        };
      });
    if (members.length === 0) return;
    // Sort visually: left-to-right, then top-to-bottom within the same column.
    members.sort((p, q) => (p.x - q.x) || (p.y - q.y));
    const centers = members.map(m => ({ x: m.x, y: m.y }));

    // Polyline (only when 2+ notes).
    let lineEl = null;
    if (centers.length >= 2) {
      const points = centers.map(c => `${c.x},${c.y}`).join(" ");
      lineEl = document.createElementNS(SVG_NS, "polyline");
      lineEl.setAttribute("class", "annot-line");
      lineEl.setAttribute("points", points);
      svg.appendChild(lineEl);
    }

    // Card. If a manual placement exists and its anchor is still a member,
    // position relative to that anchor; otherwise fall back to auto-placement.
    let pos = null;
    if (a.manualPlacement) {
      const anchor = members.find(m => m.note.id === a.manualPlacement.anchorNoteId);
      if (anchor) {
        pos = { x: anchor.x + a.manualPlacement.dx, y: anchor.y + a.manualPlacement.dy, side: "free" };
      }
    }
    if (!pos) pos = computeCardPosition(members);
    const card = el("div", { class: "annot-card annot-side-" + pos.side });
    card.dataset.annotationId = a.id;
    const preview = a.text.replace(/\s+/g, " ");
    const previewLabel = el("span", { class: "annot-preview" }, preview);
    const fullBody = el("div", { class: "annot-full" });
    fullBody.textContent = a.text;
    fullBody.style.display = "none";
    const actions = el("div", { class: "annot-actions" },
      el("button", {
        onclick: (ev) => { ev.stopPropagation(); editAnnotationOnSheet(sheet, a.id); },
      }, "Edit"),
      el("button", {
        onclick: (ev) => { ev.stopPropagation(); deleteAnnotation(sheet, a.id); },
      }, "Delete"),
    );
    card.appendChild(previewLabel);
    card.appendChild(fullBody);
    card.appendChild(actions);
    card.style.left = pos.x + "px";
    card.style.top = pos.y + "px";
    const sw = a.shrunkWidth || ANNOT_DEFAULT_SHRUNK_WIDTH;
    card.style.width = sw + "px";
    card.style.setProperty("--annot-shrunk-width", sw + "px");
    overlay.appendChild(card);

    entries.push({ id: a.id, annotation: a, members, card, line: lineEl, noteEls: members.map(m => m.domEl), previewLabel, fullBody });
  });

  bandsEl.appendChild(overlay);

  // Hover activation: hovering a card or any member note opacifies the
  // card, its line, and all member notes. Hovering the card additionally
  // expands it (small delay) to show full text and actions.
  const noteToEntries = new Map();
  entries.forEach(e => {
    e.noteEls.forEach(noteEl => {
      let arr = noteToEntries.get(noteEl);
      if (!arr) { arr = []; noteToEntries.set(noteEl, arr); }
      arr.push(e);
    });
  });

  function setActive(e, on) {
    e.card.classList.toggle("active", on);
    if (e.line) e.line.classList.toggle("active", on);
    e.noteEls.forEach(el => el.classList.toggle("annot-active", on));
  }
  function setExpanded(e, on) {
    e.card.classList.toggle("expanded", on);
    e.previewLabel.style.display = on ? "none" : "";
    e.fullBody.style.display = on ? "block" : "none";
  }

  entries.forEach(e => {
    let expandTimer = null;
    let dragging = false;
    e.card.addEventListener("mouseenter", () => {
      if (dragging) return;
      setActive(e, true);
      if (expandTimer) clearTimeout(expandTimer);
      expandTimer = setTimeout(() => setExpanded(e, true), 200);
    });
    e.card.addEventListener("mouseleave", () => {
      if (dragging) return;
      setActive(e, false);
      if (expandTimer) { clearTimeout(expandTimer); expandTimer = null; }
      setExpanded(e, false);
    });

    // Edge-aware cursor on the expanded card: near the left/right edge → ew-resize,
    // otherwise grab (handled by CSS default on .expanded).
    function edgeHit(ev) {
      const r = e.card.getBoundingClientRect();
      const relLeft = ev.clientX - r.left;
      const relRight = r.right - ev.clientX;
      if (relLeft <= ANNOT_RESIZE_EDGE) return "left";
      if (relRight <= ANNOT_RESIZE_EDGE) return "right";
      return null;
    }
    e.card.addEventListener("pointermove", (ev) => {
      if (!e.card.classList.contains("expanded")) return;
      if (e.card.classList.contains("dragging") || e.card.classList.contains("resizing")) return;
      e.card.style.cursor = edgeHit(ev) ? "ew-resize" : "";
    });

    // Card pointerdown: edges → resize (center-anchored); interior → reposition
    // drag (below the click threshold the press is treated as a click so the
    // Edit/Delete buttons still work). On release we persist either
    // `shrunkWidth` (resize) or `manualPlacement` (reposition).
    e.card.addEventListener("pointerdown", (ev) => {
      if (ev.button !== 0) return;
      if (!e.card.classList.contains("expanded")) return;

      const edge = edgeHit(ev);
      if (edge) {
        beginResize(ev, edge);
        return;
      }
      beginReposition(ev);
    });

    function beginResize(ev, edge) {
      ev.preventDefault();
      const pointerId = ev.pointerId;
      const startX = ev.clientX;
      const startWidth = e.annotation.shrunkWidth || ANNOT_DEFAULT_SHRUNK_WIDTH;
      const bandsRect0 = bandsEl.getBoundingClientRect();
      const startRect = e.card.getBoundingClientRect();
      // For free cards, the expanded and shrunk renders share the same
      // top-left (both use `style.left`); only the right edge differs.
      // Anchor on the *shrunk* card's edges, not the expanded card's:
      //   shrunkLeft  = startRect.left  (same as expanded for free)
      //   shrunkRight = shrunkLeft + startWidth
      // This avoids the right-pin sitting outside the post-snap card.
      const startLeftInBands = startRect.left - bandsRect0.left;
      const isFree = e.card.classList.contains("annot-side-free");

      dragging = true;
      if (expandTimer) { clearTimeout(expandTimer); expandTimer = null; }
      setExpanded(e, false);
      e.card.classList.add("resizing");
      e.card.style.width = startWidth + "px";
      // Free cards already render at startLeftInBands with width=startWidth
      // after the snap, so no `left` update is needed at delta=0.
      try { e.card.setPointerCapture(pointerId); } catch {}

      let newWidth = startWidth;
      const onMove = (em) => {
        const delta = em.clientX - startX;
        // Free cards anchor the opposite edge → width tracks the cursor 1:1.
        // Top/bottom cards are CSS-centered on their anchor, so both edges
        // move when width changes — to keep the dragged edge under the
        // cursor we apply 2×delta there (effectively center-anchored).
        const mult = isFree ? 1 : 2;
        let w = edge === "right" ? startWidth + mult * delta : startWidth - mult * delta;
        w = Math.max(ANNOT_MIN_WIDTH, Math.min(ANNOT_MAX_WIDTH, w));
        newWidth = w;
        e.card.style.width = w + "px";
        if (isFree && edge === "left") {
          // Pin the shrunk card's original right edge.
          e.card.style.left = (startLeftInBands + startWidth - w) + "px";
        }
        em.preventDefault();
      };
      const onUp = () => {
        e.card.removeEventListener("pointermove", onMove);
        e.card.removeEventListener("pointerup", onUp);
        e.card.removeEventListener("pointercancel", onUp);
        try { e.card.releasePointerCapture(pointerId); } catch {}
        e.card.classList.remove("resizing");
        e.card.style.cursor = "";

        if (newWidth !== startWidth) {
          pushUndo();
          e.annotation.shrunkWidth = newWidth;
          if (isFree && edge === "left" && e.annotation.manualPlacement) {
            e.annotation.manualPlacement.dx += (startWidth - newWidth);
          }
          persist();
          renderAll();
        } else {
          // No-op click on an edge — restore the expanded view so the user
          // doesn't appear to have collapsed the card just by clicking.
          if (isFree && edge === "left") {
            e.card.style.left = startLeftInBands + "px";
          }
          setExpanded(e, true);
        }
        dragging = false;
      };
      e.card.addEventListener("pointermove", onMove);
      e.card.addEventListener("pointerup", onUp);
      e.card.addEventListener("pointercancel", onUp);
    }

    function beginReposition(ev) {
      const startX = ev.clientX, startY = ev.clientY;
      const pointerId = ev.pointerId;
      let started = false;
      let grabDx = 0, grabDy = 0;

      const beginDrag = () => {
        started = true;
        dragging = true;
        if (expandTimer) { clearTimeout(expandTimer); expandTimer = null; }
        const cardRect = e.card.getBoundingClientRect();
        const bandsRect0 = bandsEl.getBoundingClientRect();
        grabDx = startX - cardRect.left;
        grabDy = startY - cardRect.top;
        const startLeft = cardRect.left - bandsRect0.left;
        const startTop = cardRect.top - bandsRect0.top;
        e.card.classList.remove("annot-side-top", "annot-side-bottom");
        e.card.classList.add("annot-side-free", "dragging");
        setExpanded(e, false);
        e.card.style.left = startLeft + "px";
        e.card.style.top = startTop + "px";
        try { e.card.setPointerCapture(pointerId); } catch {}
      };

      const onMove = (em) => {
        if (!started) {
          if (Math.hypot(em.clientX - startX, em.clientY - startY) < CLICK_MAX_MOVE) return;
          beginDrag();
        }
        const br = bandsEl.getBoundingClientRect();
        e.card.style.left = (em.clientX - br.left - grabDx) + "px";
        e.card.style.top = (em.clientY - br.top - grabDy) + "px";
        em.preventDefault();
      };
      const onUp = () => {
        e.card.removeEventListener("pointermove", onMove);
        e.card.removeEventListener("pointerup", onUp);
        e.card.removeEventListener("pointercancel", onUp);
        if (!started) return;
        try { e.card.releasePointerCapture(pointerId); } catch {}

        const finalLeft = parseFloat(e.card.style.left);
        const finalTop = parseFloat(e.card.style.top);

        const memberById = new Map(e.members.map(m => [m.note.id, m]));
        const existingAnchorId = e.annotation.manualPlacement && e.annotation.manualPlacement.anchorNoteId;
        const anchor = (existingAnchorId && memberById.get(existingAnchorId)) || e.members[0];
        if (!anchor) { dragging = false; return; }

        pushUndo();
        e.annotation.manualPlacement = {
          anchorNoteId: anchor.note.id,
          dx: finalLeft - anchor.x,
          dy: finalTop - anchor.y,
        };
        persist();
        renderAll();
      };
      e.card.addEventListener("pointermove", onMove);
      e.card.addEventListener("pointerup", onUp);
      e.card.addEventListener("pointercancel", onUp);
    }
  });

  noteToEntries.forEach((es, noteEl) => {
    noteEl.addEventListener("mouseenter", () => { es.forEach(e => setActive(e, true)); });
    noteEl.addEventListener("mouseleave", () => { es.forEach(e => setActive(e, false)); });
  });
}

// ---------- Pointer interactions ----------
const RESIZE_EDGE = 5;
const CLICK_MAX_MOVE = 3;
let drag = null;

function handlePointerDown(ev, sheet, part, wrap) {
  if (ev.button !== 0) return;
  lastFocusedSheetId = sheet.id;
  const rect = wrap.getBoundingClientRect();
  const cellW = getCellW();
  const cellH = getCellH();
  const sheetSteps = totalSteps(sheet);
  const x = ev.clientX - rect.left;
  const y = ev.clientY - rect.top;
  const stepAbs = Math.floor(x / cellW);
  const rowIdx = Math.floor(y / cellH);
  const numRows = part.hi - part.lo + 1;
  const target = ev.target.closest(".note");
  if (!target && (stepAbs < 0 || stepAbs >= sheetSteps || rowIdx < 0 || rowIdx >= numRows)) return;
  const pitch = part.hi - rowIdx;

  if (target) {
    const noteId = target.dataset.noteId;
    const note = part.notes.find(n => n.id === noteId);
    if (!note) return;
    const pendingUndo = snapshotProject();
    const noteRect = target.getBoundingClientRect();
    const relLeft = ev.clientX - noteRect.left;
    const relRight = noteRect.right - ev.clientX;
    let mode = "move";
    if (!isRhythmPart(part)) {
      if (relLeft <= RESIZE_EDGE) mode = "resize-left";
      else if (relRight <= RESIZE_EDGE) mode = "resize-right";
    }

    const wasInSelection = isNoteSelected(sheet, note.id);
    const prevSize = sheet.selectedNoteIds.size;

    if (ev.shiftKey) {
      toggleNoteSelection(sheet, note);
      renderAll();
      ev.preventDefault();
      return;
    }

    const wasSoleSelection = wasInSelection && prevSize === 1;
    sheet.selectedCell = null;
    if (!wasInSelection) {
      const sheetEl = wrap.closest(".sheet");
      if (sheetEl) sheetEl.querySelectorAll(".note.selected").forEach(e => e.classList.remove("selected"));
      setSingleSelection(sheet, note.id);
      target.classList.add("selected");
    }

    // Snapshot every selected note in this part. With one grid per part, all
    // selected notes share `wrap`.
    const group = [];
    for (const n of part.notes) {
      if (!isNoteSelected(sheet, n.id)) continue;
      group.push({
        note: n, wrap,
        origStart: n.start, origLength: n.length, origPitch: n.pitch,
        origSubOffset: n.subOffset || 0, origSubLength: n.subLength || 0,
      });
    }
    drag = {
      mode, primaryNote: note, group,
      part, sheet, wrap,
      startX: ev.clientX,
      startY: ev.clientY,
      moved: false,
      isExisting: true,
      wasSoleSelection,
      wasInMultiSelection: wasInSelection && prevSize > 1,
      wasCreateModifier: isCreateModifier(ev),
      pendingUndo,
    };
    document.body.classList.add("dragging-notes");
    try { wrap.setPointerCapture(ev.pointerId); } catch {}
    ev.preventDefault();
    return;
  }

  const existing = part.notes.find(n => n.pitch === pitch && n.start === stepAbs);
  if (existing) return;

  if (isCreateModifier(ev)) {
    const pendingUndo = snapshotProject();
    if (sheet.selectedNoteIds.size > 0) {
      const sheetEl = wrap.closest(".sheet");
      if (sheetEl) sheetEl.querySelectorAll(".note.selected").forEach(e => e.classList.remove("selected"));
    }
    const note = { id: uid(), partId: part.id, pitch, start: stepAbs, length: 1, vel: DEFAULT_VEL, subOffset: 0, subLength: 0 };
    part.notes.push(note);
    setSingleSelection(sheet, note.id);

    const noteEl = document.createElement("div");
    noteEl.className = "note selected";
    noteEl.dataset.noteId = note.id;
    noteEl.dataset.len = "1";
    noteEl.dataset.vel = String(note.vel);
    noteEl.style.left = (noteFracStart(note) * cellW) + "px";
    noteEl.style.top = ((part.hi - note.pitch) * cellH) + "px";
    noteEl.style.width = noteWidthPx(noteFracLength(note), cellW) + "px";
    noteEl.style.opacity = VEL_OPACITY[note.vel];
    wrap.appendChild(noteEl);

    drag = {
      mode: "move",
      primaryNote: note,
      group: [{
        note, wrap,
        origStart: note.start, origLength: note.length, origPitch: note.pitch,
        origSubOffset: note.subOffset || 0, origSubLength: note.subLength || 0,
      }],
      part, sheet, wrap,
      startX: ev.clientX, startY: ev.clientY,
      moved: false,
      isExisting: false,
      wasSoleSelection: false,
      pendingUndo,
    };
    document.body.classList.add("dragging-notes");
    try { wrap.setPointerCapture(ev.pointerId); } catch {}
    ev.preventDefault();
    return;
  }

  if (ev.shiftKey) {
    startGlobalRubberBand({ sheet, additive: true, anchorX: ev.clientX, anchorY: ev.clientY });
    ev.preventDefault();
    return;
  }

  drag = {
    mode: "empty-pending",
    part, sheet, wrap,
    startX: ev.clientX, startY: ev.clientY,
    pendingCell: { partId: part.id, step: stepAbs, pitch },
    moved: false,
  };
  try { wrap.setPointerCapture(ev.pointerId); } catch {}
  ev.preventDefault();
}

function clampNum(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function rectsOverlap(a, b) {
  return !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);
}

function startGlobalRubberBand(opts) {
  const { sheet, additive, anchorX, anchorY } = opts;
  const sheetEl = sheetsEl.querySelector(`[data-sheet-id="${sheet.id}"]`);
  const noteElCache = new Map();
  if (sheetEl) {
    for (const noteEl of sheetEl.querySelectorAll(".note")) {
      noteElCache.set(noteEl.dataset.noteId, noteEl);
    }
  }
  const initialSelection = new Set(sheet.selectedNoteIds);
  const initialPartId = partOfSelection(sheet);
  if (!additive) {
    for (const id of sheet.selectedNoteIds) {
      const e = noteElCache.get(id); if (e) e.classList.remove("selected");
    }
    sheet.selectedNoteIds = new Set();
  }
  sheet.selectedCell = null;
  const sel = sheetEl && sheetEl.querySelector(".cell-selected");
  if (sel && sel.parentNode) sel.parentNode.removeChild(sel);
  const bandEl = el("div", { class: "rubber-band" });
  document.body.appendChild(bandEl);
  drag = {
    mode: "rubber-band",
    sheet, additive, initialSelection, initialPartId,
    lockedPartId: null,
    anchorX, anchorY,
    bandEl, noteElCache,
  };
}

function rubberBandTick(ev) {
  const x0 = Math.min(drag.anchorX, ev.clientX);
  const y0 = Math.min(drag.anchorY, ev.clientY);
  const x1 = Math.max(drag.anchorX, ev.clientX);
  const y1 = Math.max(drag.anchorY, ev.clientY);
  drag.bandEl.style.left = x0 + "px";
  drag.bandEl.style.top = y0 + "px";
  drag.bandEl.style.width = (x1 - x0) + "px";
  drag.bandEl.style.height = (y1 - y0) + "px";
  const bandRect = { left: x0, top: y0, right: x1, bottom: y1 };

  const sheetEl = sheetsEl.querySelector(`[data-sheet-id="${drag.sheet.id}"]`);
  if (!sheetEl) return;
  const tickHits = [];
  for (const wrap of sheetEl.querySelectorAll(".grid-wrap")) {
    const wr = wrap.getBoundingClientRect();
    if (!rectsOverlap(bandRect, wr)) continue;
    const partId = wrap.dataset.partId;
    for (const noteEl of wrap.querySelectorAll(".note")) {
      const nr = noteEl.getBoundingClientRect();
      if (!rectsOverlap(bandRect, nr)) continue;
      const noteId = noteEl.dataset.noteId;
      const cx = (nr.left + nr.right) / 2, cy = (nr.top + nr.bottom) / 2;
      const d = Math.hypot(cx - drag.anchorX, cy - drag.anchorY);
      tickHits.push({ noteId, partId, d });
    }
  }
  if (drag.lockedPartId === null && tickHits.length > 0) {
    tickHits.sort((a, b) => a.d - b.d);
    drag.lockedPartId = tickHits[0].partId;
    if (drag.additive && drag.initialPartId && drag.initialPartId !== drag.lockedPartId) {
      drag.initialSelection = new Set();
    }
  }
  const locked = drag.lockedPartId;
  const intended = new Set();
  if (locked) {
    for (const h of tickHits) if (h.partId === locked) intended.add(h.noteId);
  }
  if (drag.additive) for (const id of drag.initialSelection) intended.add(id);
  applySelectionDiff(drag.sheet, intended, drag.noteElCache);
}

function applySelectionDiff(sheet, intended, cache) {
  for (const id of [...sheet.selectedNoteIds]) {
    if (!intended.has(id)) {
      sheet.selectedNoteIds.delete(id);
      const e = cache.get(id); if (e) e.classList.remove("selected");
    }
  }
  for (const id of intended) {
    if (!sheet.selectedNoteIds.has(id)) {
      sheet.selectedNoteIds.add(id);
      const e = cache.get(id); if (e) e.classList.add("selected");
    }
  }
}

document.addEventListener("pointermove", (ev) => {
  if (!drag) return;
  const cellW = getCellW();
  const cellH = getCellH();
  const dx = ev.clientX - drag.startX;
  const dy = ev.clientY - drag.startY;
  const overThreshold = Math.abs(dx) > CLICK_MAX_MOVE || Math.abs(dy) > CLICK_MAX_MOVE;
  if (overThreshold) drag.moved = true;

  // empty-pending: morph into global rubber-band on first real movement.
  if (drag.mode === "empty-pending" && overThreshold) {
    const sheet = drag.sheet;
    const anchorX = drag.startX, anchorY = drag.startY;
    drag = null;
    startGlobalRubberBand({ sheet, additive: false, anchorX, anchorY });
    rubberBandTick(ev);
    return;
  }

  if (drag.mode === "rubber-band") {
    rubberBandTick(ev);
    return;
  }

  if (!drag.group) return;
  // Drag math operates at sub-step granularity (1/SUB_PER_STEP step). All
  // *Sub variables are integers in those units; `start`/`subOffset` and
  // `length`/`subLength` are recovered by splitting.
  const subPx = cellW / SUB_PER_STEP;
  const dSubSteps = Math.round(dx / subPx);
  const dRows = Math.round(dy / cellH);
  const splitStart = (subStep) => {
    const s = Math.floor(subStep / SUB_PER_STEP);
    return { start: s, subOffset: subStep - s * SUB_PER_STEP };
  };
  const splitLen = (subLen) => {
    const l = Math.floor(subLen / SUB_PER_STEP);
    return { length: l, subLength: subLen - l * SUB_PER_STEP };
  };
  const sheetSubTotal = totalSteps(drag.sheet) * SUB_PER_STEP;

  if (drag.mode === "move") {
    let minPitch = Infinity, maxPitch = -Infinity;
    let dsLo = -Infinity, dsHi = Infinity;
    for (const g of drag.group) {
      if (g.origPitch < minPitch) minPitch = g.origPitch;
      if (g.origPitch > maxPitch) maxPitch = g.origPitch;
      const origAbsSub = g.origStart * SUB_PER_STEP + g.origSubOffset;
      const origLenSub = g.origLength * SUB_PER_STEP + g.origSubLength;
      if (-origAbsSub > dsLo) dsLo = -origAbsSub;
      if (sheetSubTotal - origAbsSub - origLenSub < dsHi) dsHi = sheetSubTotal - origAbsSub - origLenSub;
    }
    const ds = clampNum(dSubSteps, dsLo, dsHi);
    const dr = clampNum(dRows, maxPitch - drag.part.hi, minPitch - drag.part.lo);
    let changed = false;
    for (const g of drag.group) {
      const origAbsSub = g.origStart * SUB_PER_STEP + g.origSubOffset;
      const newAbsSub = origAbsSub + ds;
      const { start: ns, subOffset: nso } = splitStart(newAbsSub);
      const np = g.origPitch - dr;
      if (g.note.start !== ns || g.note.pitch !== np || (g.note.subOffset || 0) !== nso) {
        g.note.start = ns;
        g.note.pitch = np;
        g.note.subOffset = nso;
        changed = true;
      }
    }
    if (changed) for (const g of drag.group) updateNoteDom2(g.wrap, g.note, drag.part, drag.sheet);
  } else if (drag.mode === "resize-right") {
    const useSub = isCreateModifier(ev);
    let minLenSub = Infinity;
    let dlHi = Infinity;
    for (const g of drag.group) {
      const origLenSub = g.origLength * SUB_PER_STEP + g.origSubLength;
      if (origLenSub < minLenSub) minLenSub = origLenSub;
      const origStartSub = g.origStart * SUB_PER_STEP + g.origSubOffset;
      const slack = sheetSubTotal - origStartSub - origLenSub;
      if (slack < dlHi) dlHi = slack;
    }
    let dl = clampNum(dSubSteps, 1 - minLenSub, dlHi);
    if (!useSub) dl = Math.round(dl / SUB_PER_STEP) * SUB_PER_STEP;
    let changed = false;
    for (const g of drag.group) {
      let newLenSub = g.origLength * SUB_PER_STEP + g.origSubLength + dl;
      if (!useSub) newLenSub = Math.max(SUB_PER_STEP, Math.round(newLenSub / SUB_PER_STEP) * SUB_PER_STEP);
      const { length: nl, subLength: nsl } = splitLen(newLenSub);
      if (g.note.length !== nl || (g.note.subLength || 0) !== nsl) {
        g.note.length = nl;
        g.note.subLength = nsl;
        changed = true;
      }
    }
    if (changed) for (const g of drag.group) updateNoteDom2(g.wrap, g.note, drag.part, drag.sheet);
  } else if (drag.mode === "resize-left") {
    const useSub = isCreateModifier(ev);
    let minLenSub = Infinity;
    let dsLo = -Infinity, dsHi = Infinity;
    for (const g of drag.group) {
      const origLenSub = g.origLength * SUB_PER_STEP + g.origSubLength;
      if (origLenSub < minLenSub) minLenSub = origLenSub;
      const origAbsSub = g.origStart * SUB_PER_STEP + g.origSubOffset;
      if (-origAbsSub > dsLo) dsLo = -origAbsSub;
    }
    dsHi = Math.min(dsHi, minLenSub - 1);
    let ds = clampNum(dSubSteps, dsLo, dsHi);
    if (!useSub) ds = Math.round(ds / SUB_PER_STEP) * SUB_PER_STEP;
    let changed = false;
    for (const g of drag.group) {
      const origAbsSub = g.origStart * SUB_PER_STEP + g.origSubOffset;
      const origLenSub = g.origLength * SUB_PER_STEP + g.origSubLength;
      const newAbsSub = origAbsSub + ds;
      let newLenSub = origLenSub - ds;
      if (!useSub) newLenSub = Math.max(SUB_PER_STEP, Math.round(newLenSub / SUB_PER_STEP) * SUB_PER_STEP);
      const { start: ns, subOffset: nso } = splitStart(newAbsSub);
      const { length: nl, subLength: nsl } = splitLen(newLenSub);
      if (g.note.start !== ns || g.note.length !== nl
          || (g.note.subOffset || 0) !== nso || (g.note.subLength || 0) !== nsl) {
        g.note.start = ns;
        g.note.length = nl;
        g.note.subOffset = nso;
        g.note.subLength = nsl;
        changed = true;
      }
    }
    if (changed) for (const g of drag.group) updateNoteDom2(g.wrap, g.note, drag.part, drag.sheet);
  }
});

document.addEventListener("pointerup", () => {
  if (!drag) return;
  const d = drag; drag = null;
  document.body.classList.remove("dragging-notes");

  if (d.mode === "rubber-band") {
    if (d.bandEl && d.bandEl.parentNode) d.bandEl.parentNode.removeChild(d.bandEl);
    renderAll();
    persist();
    refreshCellTooltipAtLastPointer();
    return;
  }

  if (d.mode === "empty-pending") {
    // No drag → select the empty cell; clears note selection.
    setCellSelection(d.sheet, d.pendingCell);
    renderAll();
    refreshCellTooltipAtLastPointer();
    return;
  }

  if (!d.moved && d.isExisting) {
    if (d.wasSoleSelection && d.wasCreateModifier) {
      commitUndoSnapshot(d.pendingUndo);
      d.primaryNote.vel = (d.primaryNote.vel + 1) % VEL_LABELS.length;
    } else if (d.wasInMultiSelection && d.wasCreateModifier) {
      // Modifier+click on a member of a multi-selection: advance every
      // selected note's velocity independently — selection is preserved.
      commitUndoSnapshot(d.pendingUndo);
      for (const g of d.group) {
        g.note.vel = (g.note.vel + 1) % VEL_LABELS.length;
      }
    } else if (d.wasInMultiSelection) {
      // Plain click on a member of a multi-selection: collapse to sole
      // selection on the clicked note. No velocity change, no undo entry.
      setSingleSelection(d.sheet, d.primaryNote.id);
    }
    // else: sole-selected plain click, or a fresh single selection from
    // pointerdown — no-op.
    auditionNote(d.sheet, d.primaryNote);
    renderAll();
    refreshCellTooltipAtLastPointer();
  } else if (d.moved) {
    commitUndoSnapshot(d.pendingUndo);
    if (!d.isExisting) auditionNote(d.sheet, d.primaryNote);
    if (d.group && d.group.length > 0) {
      const movedIds = new Set(d.group.map(g => g.note.id));
      reconcileManualPlacementAfterMove(d.sheet, movedIds);
    }
    renderAll();
    refreshCellTooltipAtLastPointer();
  } else if (!d.isExisting) {
    // Modifier+click that created a note but never moved — still a mutation.
    commitUndoSnapshot(d.pendingUndo);
    auditionNote(d.sheet, d.primaryNote);
    renderAll();
    refreshCellTooltipAtLastPointer();
  }
});

function updateNoteDom2(wrap, note, part, sheet) {
  const noteEl = wrap.querySelector(`[data-note-id="${note.id}"]`);
  if (!noteEl) return;
  const cellW = getCellW();
  const cellH = getCellH();
  noteEl.style.left = (noteFracStart(note) * cellW) + "px";
  noteEl.style.top = ((part.hi - note.pitch) * cellH) + "px";
  noteEl.style.width = noteWidthPx(noteFracLength(note), cellW) + "px";
  if (sheet) {
    const scaleSet = inScaleSet(sheet);
    noteEl.classList.remove("in-scale");
    const cls = noteScaleClass(scaleSet, part, note.pitch).trim();
    if (cls) noteEl.classList.add(cls);
  }
}

// ---------- Hover tooltip ----------
// Format a length in steps as "N" for whole steps or "N+a/b" when fractional
// (a/b is the sub-step part reduced; e.g. 1.25 → "1+1/4", 0.5 → "1/2").
function formatLengthSteps(steps) {
  const totalSub = Math.round(steps * SUB_PER_STEP);
  const whole = Math.floor(totalSub / SUB_PER_STEP);
  const sub = totalSub - whole * SUB_PER_STEP;
  if (sub === 0) return `${whole}`;
  const g = (a, b) => b === 0 ? a : g(b, a % b);
  const d = g(sub, SUB_PER_STEP);
  const frac = `${sub / d}/${SUB_PER_STEP / d}`;
  return whole === 0 ? frac : `${whole}+${frac}`;
}
let cellTooltipEl = null;
function getCellTooltip() {
  if (!cellTooltipEl) {
    cellTooltipEl = el("div", { class: "cell-tooltip" });
    document.body.appendChild(cellTooltipEl);
  }
  return cellTooltipEl;
}
function hideCellTooltip() {
  if (cellTooltipEl) cellTooltipEl.style.display = "none";
}
function showCellTooltipAt(ev, wrap) {
  const rect = wrap.getBoundingClientRect();
  const cellH = getCellH();
  const partHi = parseInt(wrap.dataset.partHi, 10);
  const partLo = parseInt(wrap.dataset.partLo, 10);
  const numRows = partHi - partLo + 1;
  let pitch;
  let velLabel = null;
  let lenSteps = null;
  const isNoteDrag = drag && drag.primaryNote && (drag.mode === "move" || drag.mode === "resize-left" || drag.mode === "resize-right");
  if (isNoteDrag) {
    pitch = drag.primaryNote.pitch;
    velLabel = VEL_LABELS[drag.primaryNote.vel];
    lenSteps = noteFracLength(drag.primaryNote);
  } else {
    const y = ev.clientY - rect.top;
    const rowIdx = Math.floor(y / cellH);
    if (rowIdx < 0 || rowIdx >= numRows) { hideCellTooltip(); return; }
    pitch = partHi - rowIdx;
    const noteTarget = ev.target && ev.target.closest && ev.target.closest(".note");
    if (noteTarget && wrap.contains(noteTarget)) {
      const v = parseInt(noteTarget.dataset.vel, 10);
      if (Number.isFinite(v)) velLabel = VEL_LABELS[v];
      const l = parseFloat(noteTarget.dataset.len);
      if (Number.isFinite(l)) lenSteps = l;
    }
  }
  const tip = getCellTooltip();
  const isRhythm = wrap.dataset.partType === "rhythm";
  const pitchLabel = isRhythm
    ? (RHYTHM_NAMES[partHi - pitch] || "")
    : pitchName(pitch);
  const pitchHtml = `<span class="pitch">${escapeHtml(pitchLabel)}</span>`;
  const velHtml = velLabel ? `<span class="vel">${escapeHtml(velLabel)}</span>` : "";
  const lenHtml = (lenSteps != null && !isRhythm) ? `<span class="len">${escapeHtml(formatLengthSteps(lenSteps))}</span>` : "";
  tip.innerHTML = pitchHtml + velHtml + lenHtml;
  tip.style.display = "block";
  const offX = 12, offY = 14;
  let left = ev.clientX + offX;
  let top = ev.clientY + offY;
  const tw = tip.offsetWidth, th = tip.offsetHeight;
  if (left + tw > window.innerWidth - 4) left = ev.clientX - tw - offX;
  if (top + th > window.innerHeight - 4) top = ev.clientY - th - offY;
  tip.style.left = left + "px";
  tip.style.top = top + "px";
}
let lastPointer = null;
let cellHoverEl = null;
function getCellHover() {
  if (!cellHoverEl) {
    cellHoverEl = el("div", { class: "cell-hover" });
    document.body.appendChild(cellHoverEl);
  }
  return cellHoverEl;
}
function hideCellHover() { if (cellHoverEl) cellHoverEl.style.display = "none"; }
function updateCellHover(ev, wrap) {
  if (drag) { hideCellHover(); return; }
  const noteTarget = ev.target && ev.target.closest && ev.target.closest(".note");
  if (noteTarget && wrap.contains(noteTarget)) { hideCellHover(); return; }
  const rect = wrap.getBoundingClientRect();
  const cellW = getCellW();
  const cellH = getCellH();
  const x = ev.clientX - rect.left;
  const y = ev.clientY - rect.top;
  const stepAbs = Math.floor(x / cellW);
  const rowIdx = Math.floor(y / cellH);
  const partHi = parseInt(wrap.dataset.partHi, 10);
  const partLo = parseInt(wrap.dataset.partLo, 10);
  const numRows = partHi - partLo + 1;
  const maxStep = Math.round(rect.width / cellW);
  if (stepAbs < 0 || stepAbs >= maxStep || rowIdx < 0 || rowIdx >= numRows) {
    hideCellHover();
    return;
  }
  const hover = getCellHover();
  hover.style.display = "block";
  hover.style.left = (rect.left + stepAbs * cellW) + "px";
  hover.style.top = (rect.top + rowIdx * cellH) + "px";
  hover.style.width = (cellW + 2) + "px";
  hover.style.height = cellH + "px";
}
function updateNoteCursor(ev) {
  if (drag) return;
  const noteTarget = ev.target && ev.target.closest && ev.target.closest(".note");
  if (!noteTarget) return;
  const wrap = noteTarget.closest(".grid-wrap");
  if (wrap && wrap.dataset.partType === "rhythm") {
    noteTarget.style.cursor = "";
    return;
  }
  const rect = noteTarget.getBoundingClientRect();
  const relLeft = ev.clientX - rect.left;
  const relRight = rect.right - ev.clientX;
  const canResizeLeft = relLeft <= RESIZE_EDGE;
  const canResizeRight = relRight <= RESIZE_EDGE;
  noteTarget.style.cursor = (canResizeLeft || canResizeRight) ? "ew-resize" : "";
}
document.addEventListener("pointermove", (ev) => {
  lastPointer = { clientX: ev.clientX, clientY: ev.clientY };
  if (drag && drag.mode === "rubber-band") {
    hideCellTooltip(); hideCellHover();
    return;
  }
  let wrap;
  if (drag && drag.wrap) {
    wrap = drag.wrap;
  } else {
    wrap = ev.target && ev.target.closest && ev.target.closest(".grid-wrap");
  }
  if (!wrap) { hideCellTooltip(); hideCellHover(); return; }
  showCellTooltipAt(ev, wrap);
  updateCellHover(ev, wrap);
  updateNoteCursor(ev);
});
function refreshCellTooltipAtLastPointer() {
  if (!lastPointer) return;
  const elAtPoint = document.elementFromPoint(lastPointer.clientX, lastPointer.clientY);
  const wrap = elAtPoint && elAtPoint.closest && elAtPoint.closest(".grid-wrap");
  if (!wrap) { hideCellTooltip(); hideCellHover(); return; }
  const fakeEv = { clientX: lastPointer.clientX, clientY: lastPointer.clientY, target: elAtPoint };
  showCellTooltipAt(fakeEv, wrap);
  updateCellHover(fakeEv, wrap);
}
document.documentElement.addEventListener("pointerleave", () => { hideCellTooltip(); hideCellHover(); });
window.addEventListener("blur", () => { hideCellTooltip(); hideCellHover(); });

// ---------- Clipboard (copy/paste) ----------
let clipboard = null;
// shape: {
//   notes: [{ key, dStart, dRow, length, vel }, ...],
//   annotations: [{ text, noteKeys: [key, ...] }, ...]
// }
// `key` is the source note's id at copy time. Annotations refer to copied
// notes by key so paste can rebind them to freshly-minted ids.

function cutSelection(sheet) {
  if (!sheet || sheet.selectedNoteIds.size === 0) return;
  pushUndo();
  copySelection(sheet);
  removeNotesByIds(sheet, sheet.selectedNoteIds);
  clearSelection(sheet);
  sheet.selectedCell = null;
  renderAll();
  persist();
}

function copySelection(sheet) {
  if (!sheet || sheet.selectedNoteIds.size === 0) return;
  const ids = sheet.selectedNoteIds;
  const picked = [];
  for (const p of sheet.parts) {
    for (const n of p.notes) {
      if (ids.has(n.id)) picked.push(n);
    }
  }
  if (picked.length === 0) return;
  let minStart = Infinity, maxPitch = -Infinity;
  for (const n of picked) {
    if (n.start < minStart) minStart = n.start;
    if (n.pitch > maxPitch) maxPitch = n.pitch;
  }
  const pickedIdSet = new Set(picked.map(n => n.id));
  const annotations = [];
  for (const a of (sheet.annotations || [])) {
    const noteKeys = a.noteIds.filter(id => pickedIdSet.has(id));
    if (noteKeys.length > 0) annotations.push({ text: a.text, noteKeys });
  }
  clipboard = {
    notes: picked.map(n => ({
      key: n.id,
      dStart: n.start - minStart,
      dRow: maxPitch - n.pitch,
      length: n.length,
      vel: n.vel,
      subOffset: n.subOffset || 0,
      subLength: n.subLength || 0,
    })),
    annotations,
  };
}

async function pasteClipboard(sheet) {
  if (!sheet || !clipboard || clipboard.notes.length === 0) return;
  pushUndo();

  let targetStep = 0, targetPitch = 0, targetPart = null;
  const sheetSteps = totalSteps(sheet);

  if (sheet.selectedNoteIds.size > 1) {
    const ids = sheet.selectedNoteIds;
    let minStart = Infinity, maxPitch = -Infinity;
    let foundPartId = null;
    for (const p of sheet.parts) {
      for (const n of p.notes) {
        if (!ids.has(n.id)) continue;
        if (n.start < minStart) minStart = n.start;
        if (n.pitch > maxPitch) maxPitch = n.pitch;
        if (foundPartId === null) foundPartId = n.partId;
      }
    }
    if (foundPartId === null) return;
    targetPart = sheet.parts.find(p => p.id === foundPartId);
    if (!targetPart) return;
    targetStep = minStart;
    targetPitch = maxPitch;
    removeNotesByIds(sheet, ids);
    sheet.selectedNoteIds = new Set();
  } else if (sheet.selectedNoteIds.size === 1) {
    const onlyId = sheet.selectedNoteIds.values().next().value;
    const foundNote = findNote(sheet, onlyId);
    if (!foundNote) return;
    targetPart = sheet.parts.find(p => p.id === foundNote.partId);
    if (!targetPart) return;
    targetStep = foundNote.start;
    targetPitch = foundNote.pitch;
  } else if (sheet.selectedCell) {
    const c = sheet.selectedCell;
    targetPart = sheet.parts.find(p => p.id === c.partId);
    if (!targetPart) return;
    targetStep = c.step;
    targetPitch = c.pitch;
  } else {
    return;
  }

  const newIds = [];
  const keyToNewId = new Map();
  let outOfRangeMin = Infinity, outOfRangeMax = -Infinity, outOfRangeCount = 0;
  for (const cn of clipboard.notes) {
    const absStart = targetStep + cn.dStart;
    const newPitch = targetPitch - cn.dRow;
    if (absStart < 0 || absStart >= sheetSteps) continue;
    if (newPitch < PIANO_MIN || newPitch > PIANO_MAX) continue;
    let newLength = Math.min(cn.length, sheetSteps - absStart);
    if (newLength < 1) newLength = 1;
    if (isRhythmPart(targetPart)) newLength = 1;
    const note = {
      id: uid(),
      partId: targetPart.id,
      pitch: newPitch,
      start: absStart,
      length: newLength,
      vel: cn.vel,
      subOffset: cn.subOffset || 0,
      subLength: cn.subLength || 0,
    };
    targetPart.notes.push(note);
    newIds.push(note.id);
    if (cn.key != null) keyToNewId.set(cn.key, note.id);
    if (newPitch < targetPart.lo || newPitch > targetPart.hi) {
      outOfRangeCount++;
      if (newPitch < outOfRangeMin) outOfRangeMin = newPitch;
      if (newPitch > outOfRangeMax) outOfRangeMax = newPitch;
    }
  }

  // Recreate annotations bound to the surviving pasted notes. Annotations
  // whose noteKeys all dropped out of range are not recreated.
  if (newIds.length > 0 && Array.isArray(clipboard.annotations)) {
    for (const ca of clipboard.annotations) {
      const mapped = ca.noteKeys.map(k => keyToNewId.get(k)).filter(Boolean);
      if (mapped.length === 0) continue;
      sheet.annotations.push({ id: uid(), text: ca.text, noteIds: mapped });
    }
  }

  sheet.selectedCell = null;
  sheet.selectedNoteIds = new Set(newIds);
  renderAll();
  persist();

  if (outOfRangeCount > 0) {
    const newLo = Math.min(targetPart.lo, outOfRangeMin);
    const newHi = Math.max(targetPart.hi, outOfRangeMax);
    const noun = outOfRangeCount === 1 ? "note falls" : "notes fall";
    const msg = `${outOfRangeCount} pasted ${noun} outside "${targetPart.name}"'s pitch range (${pitchName(targetPart.lo)}–${pitchName(targetPart.hi)}). Extend the range to ${pitchName(newLo)}–${pitchName(newHi)} so they become visible?`;
    const ok = await confirmAsync(msg);
    if (ok) {
      targetPart.lo = newLo;
      targetPart.hi = newHi;
      renderAll();
      persist();
    }
  }
}

// ---------- Keyboard ----------
document.addEventListener("keydown", (ev) => {
  const t = ev.target;
  if (t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.isContentEditable)) return;
  if (recordingState !== "idle") return; // disable shortcuts during recording

  if (isCreateModifier(ev) && (ev.key === "z" || ev.key === "Z")) {
    if (ev.shiftKey) redo(); else undo();
    ev.preventDefault();
    return;
  }
  if (isCreateModifier(ev) && (ev.key === "c" || ev.key === "C")) {
    const sec = project.sheets.find(s => s.id === lastFocusedSheetId) || project.sheets[0];
    if (!sec) return;
    copySelection(sec);
    ev.preventDefault();
    return;
  }
  if (isCreateModifier(ev) && (ev.key === "x" || ev.key === "X")) {
    const sec = project.sheets.find(s => s.id === lastFocusedSheetId) || project.sheets[0];
    if (!sec) return;
    cutSelection(sec);
    ev.preventDefault();
    return;
  }
  if (isCreateModifier(ev) && (ev.key === "a" || ev.key === "A")) {
    annotationsVisible = !annotationsVisible;
    renderAll();
    ev.preventDefault();
    return;
  }
  if (isCreateModifier(ev) && (ev.key === "v" || ev.key === "V")) {
    const sec = project.sheets.find(s => s.id === lastFocusedSheetId) || project.sheets[0];
    if (!sec) return;
    pasteClipboard(sec);
    ev.preventDefault();
    return;
  }
  if (isCreateModifier(ev) && (ev.key === "ArrowLeft" || ev.key === "ArrowRight")) {
    const sec = project.sheets.find(s => s.id === lastFocusedSheetId) || project.sheets[0];
    if (!sec || sec.selectedNoteIds.size === 0) return;
    const delta = ev.key === "ArrowRight" ? 1 : -1;
    const notes = [];
    for (const p of sec.parts) {
      for (const n of p.notes) if (sec.selectedNoteIds.has(n.id)) notes.push(n);
    }
    if (notes.length === 0) return;
    const snap = snapshotProject();
    let moved = false;
    for (const n of notes) {
      if (shiftNoteSubOffset(sec, n, delta)) moved = true;
    }
    if (moved) {
      commitUndoSnapshot(snap);
      renderAll();
      persist();
    }
    ev.preventDefault();
    return;
  }

  if (ev.key !== "Backspace" && ev.key !== "Delete") return;
  const sec = project.sheets.find(s => s.id === lastFocusedSheetId) || project.sheets[0];
  if (!sec || sec.selectedNoteIds.size === 0) return;
  const snap = snapshotProject();
  const removed = removeNotesByIds(sec, sec.selectedNoteIds);
  if (removed > 0) {
    commitUndoSnapshot(snap);
    clearSelection(sec);
    sec.selectedCell = null;
    renderAll();
    ev.preventDefault();
  }
});

// Document-level pointerdown: initiate a global rubber-band when the press
// lands outside any grid-wrap (page background, between sheets, sheet header,
// margins). Wrap handlers take precedence and pre-set `drag` for in-wrap presses.
document.addEventListener("pointerdown", (ev) => {
  if (drag) return;
  if (ev.button !== 0) return;
  const t = ev.target;
  if (!t || !t.closest) return;
  if (t.closest(".toolbar")) return;
  if (t.closest("dialog")) return;
  if (t.closest(".tabstrip")) return;
  if (t.closest(".ctx-menu")) return;
  if (t.closest(".annot-card")) return;
  if (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.tagName === "SELECT" || t.tagName === "OPTION" || t.isContentEditable) return;
  if (t.tagName === "BUTTON") return;
  if (t.closest("label")) return;
  if (t.closest(".note")) return;
  if (t.closest(".grid-wrap")) return;
  if (t.closest(".ruler-track")) return;
  const sheetEl = t.closest(".sheet");
  let sheet;
  if (sheetEl) {
    sheet = project.sheets.find(s => s.id === sheetEl.dataset.sheetId);
    lastFocusedSheetId = sheetEl.dataset.sheetId;
  } else {
    sheet = project.sheets.find(s => s.id === lastFocusedSheetId) || project.sheets[0];
  }
  if (!sheet) return;
  startGlobalRubberBand({ sheet, additive: ev.shiftKey, anchorX: ev.clientX, anchorY: ev.clientY });
  ev.preventDefault();
});

// click empty area within a sheet deselects that sheet's note
sheetsEl.addEventListener("pointerdown", (ev) => {
  if (ev.target.closest(".note") || ev.target.closest(".grid-wrap")) return;
  const tt = ev.target.tagName;
  if (tt === "INPUT" || tt === "TEXTAREA" || tt === "SELECT" || tt === "OPTION" || tt === "BUTTON" || tt === "LABEL") return;
  if (ev.target.closest("label") || ev.target.closest("button")) return;
  const sec = ev.target.closest(".sheet");
  if (!sec) return;
  const id = sec.dataset.sheetId;
  const s = project.sheets.find(x => x.id === id);
  if (!s) return;
  let changed = false;
  if (s.selectedNoteIds.size > 0) { clearSelection(s); changed = true; }
  if (s.selectedCell) { s.selectedCell = null; changed = true; }
  if (changed) renderAll();
});

// ---------- Theme ----------
{
  const THEME_KEY = "midi-editor:theme";
  const ORDER = ["auto", "light", "dark"];
  const ICONS = { auto: "🌓", light: "☀️", dark: "🌙" };
  const NEXT_LABEL = { auto: "Light", light: "Dark", dark: "Auto" };
  const btn = document.getElementById("btn-theme");
  const mql = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;

  function readPref() {
    const v = localStorage.getItem(THEME_KEY);
    return ORDER.includes(v) ? v : "auto";
  }
  function applyTheme(pref) {
    const dark = pref === "dark" || (pref === "auto" && mql && mql.matches);
    document.documentElement.dataset.theme = dark ? "dark" : "light";
    btn.textContent = ICONS[pref];
    const name = pref[0].toUpperCase() + pref.slice(1);
    btn.title = `Theme: ${name} (click for ${NEXT_LABEL[pref]})`;
  }

  applyTheme(readPref());
  btn.addEventListener("click", () => {
    const cur = readPref();
    const next = ORDER[(ORDER.indexOf(cur) + 1) % ORDER.length];
    localStorage.setItem(THEME_KEY, next);
    applyTheme(next);
  });
  if (mql) {
    const onChange = () => { if (readPref() === "auto") applyTheme("auto"); };
    if (mql.addEventListener) mql.addEventListener("change", onChange);
    else if (mql.addListener) mql.addListener(onChange);
  }
}
