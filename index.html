      ),
      el("button", { onclick: () => movePart(sheet, idx, -1) }, "▲"),
      el("button", { onclick: () => movePart(sheet, idx, +1) }, "▼"),
      el("button", { disabled: sheet.parts.length <= 1, onclick: () => deletePart(sheet, idx) }, "✕"),
    );
    panel.appendChild(row);
  });
  panel.appendChild(el("button", {
    onclick: () => { sheet.parts.push(makePart(`Part ${sheet.parts.length + 1}`)); renderAll(); },
  }, "+ Add Part"));
  return panel;
}

function makePitchSelect(min, max, value, onChange, sheet) {
  const sel = el("select");
  for (let m = max; m >= min; m--) {
    const label = sheet ? pitchDisplayName(m, sheet, true) : pitchName(m);
    sel.appendChild(el("option", { value: String(m), selected: m === value }, label));
  }
  sel.addEventListener("change", (e) => onChange(parseInt(e.target.value, 10)));
  return sel;
}

function updatePartSideLabels(sheetId, partId, name) {
  document.querySelectorAll(`[data-sheet-id="${sheetId}"] [data-part-id="${partId}"] .part-side`).forEach(e => e.textContent = name);
}

function stepRange(part, which, delta) {
  if (which === "lo") {
    const next = part.lo + delta;
    if (next < PIANO_MIN || next >= part.hi) return;
    part.lo = next;
  } else {
    const next = part.hi + delta;
    if (next > PIANO_MAX || next <= part.lo) return;
    part.hi = next;
  }
  renderAll();
}

function movePart(sheet, idx, dir) {
  const j = idx + dir;
  if (j < 0 || j >= sheet.parts.length) return;
  const [p] = sheet.parts.splice(idx, 1);
  sheet.parts.splice(j, 0, p);
  renderAll();
}

async function deletePart(sheet, idx) {
  if (sheet.parts.length <= 1) return;
  const part = sheet.parts[idx];
  let count = 0;
  for (const b of sheet.bars) for (const n of b.notes) if (n.partId === part.id) count++;
  if (count > 0 && !(await confirmAsync(`Delete part "${part.name}" and ${count} note(s)?`))) return;
  sheet.parts.splice(idx, 1);
  const doomed = new Set();
  for (const b of sheet.bars) for (const n of b.notes) if (n.partId === part.id) doomed.add(n.id);
  removeNotesByIds(sheet, doomed);
  renderAll();
}

function renderBands(sheet) {
  const bandsEl = el("div", { class: "bands" });
  const N = Math.max(1, Math.min(barsPerBand(), sheet.bars.length));
  for (let bandStart = 0; bandStart < sheet.bars.length; bandStart += N) {
    const bandBars = sheet.bars.slice(bandStart, bandStart + N);
    bandsEl.appendChild(renderBand(sheet, bandStart, bandBars));
  }
  return bandsEl;
}

function renderBand(sheet, bandStart, bandBars) {
  const cellW = getCellW();
  const cellH = getCellH();
  const bandEl = el("div", { class: "band" });

  // Bar number row
  const numRow = el("div", { class: "band-bar-numbers" });
  numRow.style.gridTemplateColumns = `repeat(${bandBars.length}, calc(var(--label-w) + var(--cell-w) * ${STEPS_PER_BAR}))`;
  bandBars.forEach((bar, i) => {
    const span = el("span", {}, `Bar ${bandStart + i + 1}`);
    if (sheet.bars.length > 1) {
      const delBtn = el("button", {
        style: "margin-left:6px; font-size:10px; padding:0 4px; cursor:pointer;",
        onclick: async () => {
          if (await confirmAsync("Delete this bar?")) {
            const idx = bandStart + i;
            const doomed = new Set(sheet.bars[idx].notes.map(n => n.id));
            sheet.bars.splice(idx, 1);
            if (sheet.bars.length === 0) sheet.bars.push(makeBar());
            if (doomed.size > 0) removeNotesByIds(sheet, doomed);
            renderAll();
          }
        },
      }, "✕");
      span.appendChild(delBtn);
    }
    numRow.appendChild(span);
  });
  bandEl.appendChild(numRow);

  // Ruler row: clickable per-bar tracks for setting playStart
  const rulerRow = el("div", { class: "band-ruler" });
  rulerRow.style.gridTemplateColumns = `repeat(${bandBars.length}, calc(var(--label-w) + var(--cell-w) * ${STEPS_PER_BAR}))`;
  bandBars.forEach((bar, i) => {
    const absBarIdx = bandStart + i;
    const rulerBar = el("div", { class: "ruler-bar" });
    const track = el("div", { class: "ruler-track" });
    track.dataset.barIndex = String(absBarIdx);
    const marker = el("div", { class: "playhead-marker start" });
    marker.style.display = "none";
    track.appendChild(marker);
    const liveMarker = el("div", { class: "playhead-marker live" });
    liveMarker.style.display = "none";
    track.appendChild(liveMarker);
    track.addEventListener("click", (ev) => {
      const rect = track.getBoundingClientRect();
      const cw = getCellW();
      let step = Math.floor((ev.clientX - rect.left) / cw);
      if (step < 0) step = 0;
      if (step > STEPS_PER_BAR - 1) step = STEPS_PER_BAR - 1;
      const newAbs = absBarIdx * STEPS_PER_BAR + step;
      sheet.playStart = newAbs;
      if (playingSheetId === sheet.id) {
        // Seek mid-playback: restart playback from the new step.
        playSheet(sheet, newAbs);
      } else if (pausedSheetId === sheet.id) {
        // While paused, keep the freeze/resume point aligned with the cursor.
        pausedStep = newAbs;
        updatePlayheadDom(sheet);
      } else {
        updatePlayheadDom(sheet);
      }
    });
    rulerBar.appendChild(track);
    rulerRow.appendChild(rulerBar);
  });
  bandEl.appendChild(rulerRow);

  // Rows: one per part
  const scaleSet = inScaleSet(sheet);
  sheet.parts.forEach(part => {
    const partRow = el("div", { class: "band-row" });
    partRow.dataset.partId = part.id;
    const side = el("div", { class: "part-side" }, part.name);
    const strip = el("div", { class: "bars-strip" });
    strip.style.gridTemplateColumns = `repeat(${bandBars.length}, calc(var(--label-w) + var(--cell-w) * ${STEPS_PER_BAR}))`;
    const numRows = part.hi - part.lo + 1;

    bandBars.forEach((bar, bi) => {
      const cell = el("div", { class: "bar-cell" });
      const noteInput = el("input", {
        class: "bar-note-input",
        type: "text",
        placeholder: "",
        value: (bar.partNotes && bar.partNotes[part.id]) || "",
      });
      noteInput.addEventListener("input", (e) => {
        if (!bar.partNotes) bar.partNotes = {};
        bar.partNotes[part.id] = e.target.value;
        persist();
      });
      cell.appendChild(noteInput);
      const gridRow = el("div", { class: "bar-grid" });
      const labelCol = el("div", { class: "label-col" });
      const wrap = el("div", { class: "grid-wrap" });
      wrap.dataset.partId = part.id;
      wrap.dataset.partHi = String(part.hi);
      wrap.dataset.partLo = String(part.lo);
      wrap.dataset.barIndex = String(bandStart + bi);
      wrap.style.width = `calc(var(--cell-w) * ${STEPS_PER_BAR})`;
      wrap.style.height = `calc(var(--cell-h) * ${numRows})`;

      for (let i = 0; i < numRows; i++) {
        const pitch = part.hi - i;
        const pc = ((pitch % 12) + 12) % 12;
        const rowEl = el("div", { class: "grid-row" });
        if (pc === sheet.scale.root) rowEl.classList.add("in-scale-root");
        else if (scaleSet.has(pc)) rowEl.classList.add("in-scale");
        wrap.appendChild(rowEl);

        const isBoundary = pitch === part.lo || pitch === part.hi;
        const inScale = scaleSet.has(pc);
        let labelHtml = "";
        if (isBoundary) labelHtml = pitchDisplayHtml(pitch, sheet, true);
        else if (inScale) labelHtml = pitchDisplayHtml(pitch, sheet, false);
        const labelDiv = el("div", { class: "label-row" });
        labelDiv.innerHTML = labelHtml;
        labelCol.appendChild(labelDiv);
      }
      gridRow.appendChild(labelCol);
      gridRow.appendChild(wrap);

      bar.notes.filter(n => n.partId === part.id).forEach(n => {
        if (n.pitch < part.lo || n.pitch > part.hi) return;
        const noteEl = el("div", { class: "note" + (isNoteSelected(sheet, n.id) ? " selected" : "") });
        noteEl.dataset.noteId = n.id;
        noteEl.dataset.vel = String(n.vel);
        noteEl.dataset.len = String(n.length);
        const top = (part.hi - n.pitch) * cellH;
        noteEl.style.left = (n.start * cellW) + "px";
        noteEl.style.top = top + "px";
        noteEl.style.width = (n.length * cellW - 1) + "px";
        noteEl.style.opacity = VEL_OPACITY[n.vel];
        noteEl.addEventListener("contextmenu", (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          openNoteContextMenu(ev, sheet, n);
        });
        wrap.appendChild(noteEl);
      });

      if (sheet.selectedCell &&
          sheet.selectedCell.barId === bar.id &&
          sheet.selectedCell.partId === part.id &&
          sheet.selectedCell.pitch >= part.lo &&
          sheet.selectedCell.pitch <= part.hi) {
        const selEl = el("div", { class: "cell-selected" });
        selEl.style.left = (sheet.selectedCell.step * cellW) + "px";
        selEl.style.top = ((part.hi - sheet.selectedCell.pitch) * cellH) + "px";
        selEl.style.width = (cellW - 1) + "px";
        selEl.style.height = (cellH - 1) + "px";
        wrap.appendChild(selEl);
      }

      const playLine = el("div", { class: "playhead-line" });
      wrap.appendChild(playLine);

      wrap.addEventListener("pointerdown", (ev) => handlePointerDown(ev, sheet, part, wrap, bar));
      cell.appendChild(gridRow);
      strip.appendChild(cell);
    });

    partRow.appendChild(side);
    partRow.appendChild(strip);
    bandEl.appendChild(partRow);
  });
  return bandEl;
}

// ---------- Annotation overlay ----------
// Strategy hook: where to place the floating card. Receives the array of
// member descriptors (each with bands-relative x/y center and left/top/right/
// bottom rect). Returns { x, y, side } where side ∈ {"top","bottom","left",
// "right"} and the card is anchored just outside the member-bbox on that side,
// so expansion can grow away from the notes without overlapping them.
function computeCardPosition(members) {
  const GAP = 6;
  let left = Infinity, top = Infinity, right = -Infinity, bottom = -Infinity;
  let sy = 0;
  for (const m of members) {
    if (m.left   < left)   left   = m.left;
    if (m.top    < top)    top    = m.top;
    if (m.right  > right)  right  = m.right;
    if (m.bottom > bottom) bottom = m.bottom;
    sy += m.y;
  }
  const cy = sy / members.length;
  const midX = (left + right) / 2;
  const side = (cy - top) <= (bottom - cy) ? "top" : "bottom";
  if (side === "top") return { x: midX, y: top - GAP, side };
  return { x: midX, y: bottom + GAP, side };
}

function renderAnnotationOverlay(sheet, bandsEl) {
  // Tear down any previous overlay.
  const prev = bandsEl.querySelector(":scope > .annot-overlay");
  if (prev) prev.remove();
  if (!annotationsVisible) return;
  if (!sheet.annotations || sheet.annotations.length === 0) return;

  const bandsRect = bandsEl.getBoundingClientRect();

  // Look up each note's model and DOM element once.
  const noteById = new Map();
  for (const b of sheet.bars) for (const n of b.notes) noteById.set(n.id, n);
  const elByNoteId = new Map();
  bandsEl.querySelectorAll(".note").forEach(el => {
    const id = el.dataset.noteId;
    if (id) elByNoteId.set(id, el);
  });

  const overlay = el("div", { class: "annot-overlay" });
  const SVG_NS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(SVG_NS, "svg");
  overlay.appendChild(svg);

  // Per-annotation entries used for hover wiring.
  const entries = []; // { id, card, line|null, noteEls:[] }

  sheet.annotations.forEach(a => {
    const members = a.noteIds
      .map(id => ({ note: noteById.get(id), domEl: elByNoteId.get(id) }))
      .filter(m => m.note && m.domEl)
      .map(m => {
        const r = m.domEl.getBoundingClientRect();
        const left = r.left - bandsRect.left;
        const top = r.top - bandsRect.top;
        const right = r.right - bandsRect.left;
        const bottom = r.bottom - bandsRect.top;
        return {
          ...m,
          left, top, right, bottom,
          x: (left + right) / 2,
          y: (top + bottom) / 2,
        };
      });
    if (members.length === 0) return;
    // Sort visually: left-to-right, then top-to-bottom within the same column.
    members.sort((p, q) => (p.x - q.x) || (p.y - q.y));
    const centers = members.map(m => ({ x: m.x, y: m.y }));

    // Polyline (only when 2+ notes).
    let lineEl = null;
    if (centers.length >= 2) {
      const points = centers.map(c => `${c.x},${c.y}`).join(" ");
      lineEl = document.createElementNS(SVG_NS, "polyline");
      lineEl.setAttribute("class", "annot-line");
      lineEl.setAttribute("points", points);
      svg.appendChild(lineEl);
    }

    // Card.
    const pos = computeCardPosition(members);
    const card = el("div", { class: "annot-card annot-side-" + pos.side });
    card.dataset.annotationId = a.id;
    const preview = a.text.replace(/\s+/g, " ").slice(0, 10);
    const previewLabel = el("span", { class: "annot-preview" }, preview + (a.text.length > 10 ? "…" : ""));
    const fullBody = el("div", { class: "annot-full" });
    fullBody.textContent = a.text;
    fullBody.style.display = "none";
    const actions = el("div", { class: "annot-actions" },
      el("button", {
        onclick: (ev) => { ev.stopPropagation(); editAnnotationOnSheet(sheet, a.id); },
      }, "Edit"),
      el("button", {
        onclick: (ev) => { ev.stopPropagation(); deleteAnnotation(sheet, a.id); },
      }, "Delete"),
    );
    card.appendChild(previewLabel);
    card.appendChild(fullBody);
    card.appendChild(actions);
    card.style.left = pos.x + "px";
    card.style.top = pos.y + "px";
    overlay.appendChild(card);

    entries.push({ id: a.id, card, line: lineEl, noteEls: members.map(m => m.domEl), previewLabel, fullBody });
  });

  bandsEl.appendChild(overlay);

  // Hover activation: hovering a card or any member note opacifies the
  // card, its line, and all member notes. Hovering the card additionally
  // expands it (small delay) to show full text and actions.
  const noteToEntries = new Map();
  entries.forEach(e => {
    e.noteEls.forEach(noteEl => {
      let arr = noteToEntries.get(noteEl);
      if (!arr) { arr = []; noteToEntries.set(noteEl, arr); }
      arr.push(e);
    });
  });

  function setActive(e, on) {
    e.card.classList.toggle("active", on);
    if (e.line) e.line.classList.toggle("active", on);
    e.noteEls.forEach(el => el.classList.toggle("annot-active", on));
  }
  function setExpanded(e, on) {
    e.card.classList.toggle("expanded", on);
    e.previewLabel.style.display = on ? "none" : "";
    e.fullBody.style.display = on ? "block" : "none";
  }

  entries.forEach(e => {
    let expandTimer = null;
    e.card.addEventListener("mouseenter", () => {
      setActive(e, true);
      if (expandTimer) clearTimeout(expandTimer);
      expandTimer = setTimeout(() => setExpanded(e, true), 200);
    });
    e.card.addEventListener("mouseleave", () => {
      setActive(e, false);
      if (expandTimer) { clearTimeout(expandTimer); expandTimer = null; }
      setExpanded(e, false);
    });
  });

  noteToEntries.forEach((es, noteEl) => {
    noteEl.addEventListener("mouseenter", () => { es.forEach(e => setActive(e, true)); });
    noteEl.addEventListener("mouseleave", () => { es.forEach(e => setActive(e, false)); });
  });
}

// ---------- Pointer interactions ----------
const RESIZE_EDGE = 5;
const CLICK_MAX_MOVE = 3;
let drag = null;

function handlePointerDown(ev, sheet, part, wrap, bar) {
  if (ev.button !== 0) return;
  lastFocusedSheetId = sheet.id;
  const rect = wrap.getBoundingClientRect();
  const cellW = getCellW();
  const cellH = getCellH();
  const x = ev.clientX - rect.left;
  const y = ev.clientY - rect.top;
  const stepInBar = Math.floor(x / cellW);
  const rowIdx = Math.floor(y / cellH);
  const numRows = part.hi - part.lo + 1;
  if (stepInBar < 0 || stepInBar >= STEPS_PER_BAR || rowIdx < 0 || rowIdx >= numRows) return;
  const pitch = part.hi - rowIdx;

  const target = ev.target.closest(".note");
  if (target) {
    const noteId = target.dataset.noteId;
    const note = bar.notes.find(n => n.id === noteId);
    if (!note) return;
    const noteRect = target.getBoundingClientRect();
    const relLeft = ev.clientX - noteRect.left;
    const relRight = noteRect.right - ev.clientX;
    let mode = "move";
    if (relLeft <= RESIZE_EDGE && note.length > 1) mode = "resize-left";
    else if (relRight <= RESIZE_EDGE) mode = "resize-right";

    const wasInSelection = isNoteSelected(sheet, note.id);
    const prevSize = sheet.selectedNoteIds.size;

    if (ev.shiftKey) {
      toggleNoteSelection(sheet, note);
      renderAll();
      ev.preventDefault();
      return;
    }

    // Plain click on a note.
    const wasSoleSelection = wasInSelection && prevSize === 1;
    sheet.selectedCell = null;
    if (!wasInSelection) {
      const sheetEl = wrap.closest(".sheet");
      if (sheetEl) sheetEl.querySelectorAll(".note.selected").forEach(e => e.classList.remove("selected"));
      setSingleSelection(sheet, note.id);
      target.classList.add("selected");
    } else if (!wasSoleSelection) {
      // Note is one of several selected — drag the whole group;
      // selection-collapse happens on a no-move pointerup.
    }

    // Snapshot every selected note in this part (possibly across multiple bars).
    const sheetElForGroup = wrap.closest(".sheet");
    const group = [];
    for (const b of sheet.bars) {
      for (const n of b.notes) {
        if (n.partId !== part.id) continue;
        if (!isNoteSelected(sheet, n.id)) continue;
        let noteWrap = wrap;
        if (b !== bar && sheetElForGroup) {
          const noteEl = sheetElForGroup.querySelector(`[data-note-id="${n.id}"]`);
          if (noteEl) noteWrap = noteEl.closest(".grid-wrap") || wrap;
        }
        group.push({ note: n, wrap: noteWrap, origStart: n.start, origLength: n.length, origPitch: n.pitch });
      }
    }
    drag = {
      mode, primaryNote: note, group,
      bar, part, sheet, wrap,
      startX: ev.clientX,
      startY: ev.clientY,
      moved: false,
      isExisting: true,
      wasSoleSelection,
      wasInMultiSelection: wasInSelection && prevSize > 1,
    };
    try { wrap.setPointerCapture(ev.pointerId); } catch {}
    ev.preventDefault();
    return;
  }

  // Empty cell behavior:
  //   - Cmd (mac) / Ctrl (other): create a new 1-step note and start moving it.
  //   - Shift-drag: rubber-band (additive).
  //   - Plain pointerdown: pending — on click → select cell; on drag → rubber-band (replace).
  const existing = bar.notes.find(n => n.partId === part.id && n.pitch === pitch && n.start === stepInBar);
  if (existing) return;

  if (isCreateModifier(ev)) {
    if (sheet.selectedNoteIds.size > 0) {
      const sheetEl = wrap.closest(".sheet");
      if (sheetEl) sheetEl.querySelectorAll(".note.selected").forEach(e => e.classList.remove("selected"));
    }
    const note = { id: uid(), partId: part.id, pitch, start: stepInBar, length: 1, vel: DEFAULT_VEL };
    bar.notes.push(note);
    setSingleSelection(sheet, note.id);

    const noteEl = document.createElement("div");
    noteEl.className = "note selected";
    noteEl.dataset.noteId = note.id;
    noteEl.dataset.len = "1";
    noteEl.dataset.vel = String(note.vel);
    noteEl.style.left = (note.start * cellW) + "px";
    noteEl.style.top = ((part.hi - note.pitch) * cellH) + "px";
    noteEl.style.width = (note.length * cellW - 1) + "px";
    noteEl.style.opacity = VEL_OPACITY[note.vel];
    wrap.appendChild(noteEl);

    drag = {
      mode: "move",
      primaryNote: note,
      group: [{ note, origStart: note.start, origLength: note.length, origPitch: note.pitch }],
      bar, part, sheet, wrap,
      startX: ev.clientX, startY: ev.clientY,
      moved: false,
      isExisting: false,
      wasSoleSelection: false,
    };
    try { wrap.setPointerCapture(ev.pointerId); } catch {}
    ev.preventDefault();
    return;
  }

  if (ev.shiftKey) {
    startGlobalRubberBand({ sheet, additive: true, anchorX: ev.clientX, anchorY: ev.clientY });
    ev.preventDefault();
    return;
  }

  // Plain pointerdown on empty cell — defer to pointermove / pointerup.
  drag = {
    mode: "empty-pending",
    bar, part, sheet, wrap,
    startX: ev.clientX, startY: ev.clientY,
    pendingCell: { barId: bar.id, partId: part.id, step: stepInBar, pitch },
    moved: false,
  };
  try { wrap.setPointerCapture(ev.pointerId); } catch {}
  ev.preventDefault();
}

function clampNum(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function rectsOverlap(a, b) {
  return !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);
}

function startGlobalRubberBand(opts) {
  const { sheet, additive, anchorX, anchorY } = opts;
  const sheetEl = sheetsEl.querySelector(`[data-sheet-id="${sheet.id}"]`);
  const noteElCache = new Map();
  if (sheetEl) {
    for (const noteEl of sheetEl.querySelectorAll(".note")) {
      noteElCache.set(noteEl.dataset.noteId, noteEl);
    }
  }
  const initialSelection = new Set(sheet.selectedNoteIds);
  const initialPartId = partOfSelection(sheet);
  if (!additive) {
    for (const id of sheet.selectedNoteIds) {
      const e = noteElCache.get(id); if (e) e.classList.remove("selected");
    }
    sheet.selectedNoteIds = new Set();
  }
  sheet.selectedCell = null;
  const sel = sheetEl && sheetEl.querySelector(".cell-selected");
  if (sel && sel.parentNode) sel.parentNode.removeChild(sel);
  const bandEl = el("div", { class: "rubber-band" });
  document.body.appendChild(bandEl);
  drag = {
    mode: "rubber-band",
    sheet, additive, initialSelection, initialPartId,
    lockedPartId: null,
    anchorX, anchorY,
    bandEl, noteElCache,
  };
}

function rubberBandTick(ev) {
  const x0 = Math.min(drag.anchorX, ev.clientX);
  const y0 = Math.min(drag.anchorY, ev.clientY);
  const x1 = Math.max(drag.anchorX, ev.clientX);
  const y1 = Math.max(drag.anchorY, ev.clientY);
  drag.bandEl.style.left = x0 + "px";
  drag.bandEl.style.top = y0 + "px";
  drag.bandEl.style.width = (x1 - x0) + "px";
  drag.bandEl.style.height = (y1 - y0) + "px";
  const bandRect = { left: x0, top: y0, right: x1, bottom: y1 };

  const sheetEl = sheetsEl.querySelector(`[data-sheet-id="${drag.sheet.id}"]`);
  if (!sheetEl) return;
  const tickHits = [];
  for (const wrap of sheetEl.querySelectorAll(".grid-wrap")) {
    const wr = wrap.getBoundingClientRect();
    if (!rectsOverlap(bandRect, wr)) continue;
    const partId = wrap.dataset.partId;
    for (const noteEl of wrap.querySelectorAll(".note")) {
      const nr = noteEl.getBoundingClientRect();
      if (!rectsOverlap(bandRect, nr)) continue;
      const noteId = noteEl.dataset.noteId;
      const cx = (nr.left + nr.right) / 2, cy = (nr.top + nr.bottom) / 2;
      const d = Math.hypot(cx - drag.anchorX, cy - drag.anchorY);
      tickHits.push({ noteId, partId, d });
    }
  }
  if (drag.lockedPartId === null && tickHits.length > 0) {
    tickHits.sort((a, b) => a.d - b.d);
    drag.lockedPartId = tickHits[0].partId;
    if (drag.additive && drag.initialPartId && drag.initialPartId !== drag.lockedPartId) {
      drag.initialSelection = new Set();
    }
  }
  const locked = drag.lockedPartId;
  const intended = new Set();
  if (locked) {
    for (const h of tickHits) if (h.partId === locked) intended.add(h.noteId);
  }
  if (drag.additive) for (const id of drag.initialSelection) intended.add(id);
  applySelectionDiff(drag.sheet, intended, drag.noteElCache);
}

function applySelectionDiff(sheet, intended, cache) {
  for (const id of [...sheet.selectedNoteIds]) {
    if (!intended.has(id)) {
      sheet.selectedNoteIds.delete(id);
      const e = cache.get(id); if (e) e.classList.remove("selected");
    }
  }
  for (const id of intended) {
    if (!sheet.selectedNoteIds.has(id)) {
      sheet.selectedNoteIds.add(id);
      const e = cache.get(id); if (e) e.classList.add("selected");
    }
  }
}

document.addEventListener("pointermove", (ev) => {
  if (!drag) return;
  const cellW = getCellW();
  const cellH = getCellH();
  const dx = ev.clientX - drag.startX;
  const dy = ev.clientY - drag.startY;
  const overThreshold = Math.abs(dx) > CLICK_MAX_MOVE || Math.abs(dy) > CLICK_MAX_MOVE;
  if (overThreshold) drag.moved = true;

  // empty-pending: morph into global rubber-band on first real movement.
  if (drag.mode === "empty-pending" && overThreshold) {
    const sheet = drag.sheet;
    const anchorX = drag.startX, anchorY = drag.startY;
    drag = null;
    startGlobalRubberBand({ sheet, additive: false, anchorX, anchorY });
    rubberBandTick(ev);
    return;
  }

  if (drag.mode === "rubber-band") {
    rubberBandTick(ev);
    return;
  }

  if (!drag.group) return;
  const dSteps = Math.round(dx / cellW);
  const dRows = Math.round(dy / cellH);

  if (drag.mode === "move") {
    let minStart = Infinity, maxEnd = -Infinity, minPitch = Infinity, maxPitch = -Infinity;
    for (const g of drag.group) {
      if (g.origStart < minStart) minStart = g.origStart;
      if (g.origStart + g.origLength > maxEnd) maxEnd = g.origStart + g.origLength;
      if (g.origPitch < minPitch) minPitch = g.origPitch;
      if (g.origPitch > maxPitch) maxPitch = g.origPitch;
    }
    const ds = clampNum(dSteps, -minStart, STEPS_PER_BAR - maxEnd);
    // dRows is in screen-row units; pitch = origPitch - dRows.
    // Allowed: origPitch - dRows ∈ [part.lo, part.hi] for all → dRows ∈ [maxPitch - part.hi, minPitch - part.lo].
    const dr = clampNum(dRows, maxPitch - drag.part.hi, minPitch - drag.part.lo);
    let changed = false;
    for (const g of drag.group) {
      const ns = g.origStart + ds;
      const np = g.origPitch - dr;
      if (g.note.start !== ns || g.note.pitch !== np) {
        g.note.start = ns;
        g.note.pitch = np;
        changed = true;
      }
    }
    if (changed) for (const g of drag.group) updateNoteDom2(g.wrap, g.note, drag.part);
  } else if (drag.mode === "resize-right") {
    let minLen = Infinity, maxEnd = -Infinity;
    for (const g of drag.group) {
      if (g.origLength < minLen) minLen = g.origLength;
      if (g.origStart + g.origLength > maxEnd) maxEnd = g.origStart + g.origLength;
    }
    const dl = clampNum(dSteps, 1 - minLen, STEPS_PER_BAR - maxEnd);
    let changed = false;
    for (const g of drag.group) {
      const nl = g.origLength + dl;
      if (g.note.length !== nl) {
        g.note.length = nl;
        changed = true;
      }
    }
    if (changed) for (const g of drag.group) updateNoteDom2(g.wrap, g.note, drag.part);
  } else if (drag.mode === "resize-left") {
    let minStart = Infinity, minLen = Infinity;
    for (const g of drag.group) {
      if (g.origStart < minStart) minStart = g.origStart;
      if (g.origLength < minLen) minLen = g.origLength;
    }
    // dStart applied uniformly: newStart = origStart + ds, newLen = origLength - ds.
    // newStart >= 0 → ds >= -minStart. newLen >= 1 → ds <= minLen - 1.
    const ds = clampNum(dSteps, -minStart, minLen - 1);
    let changed = false;
    for (const g of drag.group) {
      const ns = g.origStart + ds;
      const nl = g.origLength - ds;
      if (g.note.start !== ns || g.note.length !== nl) {
        g.note.start = ns;
        g.note.length = nl;
        changed = true;
      }
    }
    if (changed) for (const g of drag.group) updateNoteDom2(g.wrap, g.note, drag.part);
  }
});

document.addEventListener("pointerup", () => {
  if (!drag) return;
  const d = drag; drag = null;

  if (d.mode === "rubber-band") {
    if (d.bandEl && d.bandEl.parentNode) d.bandEl.parentNode.removeChild(d.bandEl);
    renderAll();
    persist();
    refreshCellTooltipAtLastPointer();
    return;
  }

  if (d.mode === "empty-pending") {
    // No drag → select the empty cell; clears note selection.
    setCellSelection(d.sheet, d.pendingCell);
    renderAll();
    refreshCellTooltipAtLastPointer();
    return;
  }

  if (!d.moved && d.isExisting) {
    if (d.wasSoleSelection) {
      d.primaryNote.vel = (d.primaryNote.vel + 1) % VEL_LABELS.length;
    } else if (d.wasInMultiSelection) {
      // Click on a member of a multi-selection: advance every selected
      // note's velocity independently — selection is preserved.
      for (const g of d.group) {
        g.note.vel = (g.note.vel + 1) % VEL_LABELS.length;
      }
    }
    // else: fresh single-note selection — no cycle this click.
    renderAll();
    refreshCellTooltipAtLastPointer();
  } else if (d.moved) {
    renderAll();
    refreshCellTooltipAtLastPointer();
  }
});

function updateNoteDom2(wrap, note, part) {
  const noteEl = wrap.querySelector(`[data-note-id="${note.id}"]`);
  if (!noteEl) return;
  const cellW = getCellW();
  const cellH = getCellH();
  noteEl.style.left = (note.start * cellW) + "px";
  noteEl.style.top = ((part.hi - note.pitch) * cellH) + "px";
  noteEl.style.width = (note.length * cellW - 1) + "px";
}

// ---------- Hover tooltip ----------
let cellTooltipEl = null;
function getCellTooltip() {
  if (!cellTooltipEl) {
    cellTooltipEl = el("div", { class: "cell-tooltip" });
    document.body.appendChild(cellTooltipEl);
  }
  return cellTooltipEl;
}
function hideCellTooltip() {
  if (cellTooltipEl) cellTooltipEl.style.display = "none";
}
function showCellTooltipAt(ev, wrap) {
  const rect = wrap.getBoundingClientRect();
  const cellH = getCellH();
  const y = ev.clientY - rect.top;
  const partHi = parseInt(wrap.dataset.partHi, 10);
  const partLo = parseInt(wrap.dataset.partLo, 10);
  const numRows = partHi - partLo + 1;
  const rowIdx = Math.floor(y / cellH);
  if (rowIdx < 0 || rowIdx >= numRows) { hideCellTooltip(); return; }
  const pitch = partHi - rowIdx;
  let velLabel = null;
  if (drag && drag.note) {
    velLabel = VEL_LABELS[drag.note.vel];
  } else {
    const noteTarget = ev.target && ev.target.closest && ev.target.closest(".note");
    if (noteTarget && wrap.contains(noteTarget)) {
      const v = parseInt(noteTarget.dataset.vel, 10);
      if (Number.isFinite(v)) velLabel = VEL_LABELS[v];
    }
  }
  const tip = getCellTooltip();
  const pitchHtml = `<span class="pitch">${escapeHtml(pitchName(pitch))}</span>`;
  const velHtml = velLabel ? `<span class="vel">${escapeHtml(velLabel)}</span>` : "";
  tip.innerHTML = pitchHtml + velHtml;
  tip.style.display = "block";
  const offX = 12, offY = 14;
  let left = ev.clientX + offX;
  let top = ev.clientY + offY;
  const tw = tip.offsetWidth, th = tip.offsetHeight;
  if (left + tw > window.innerWidth - 4) left = ev.clientX - tw - offX;
  if (top + th > window.innerHeight - 4) top = ev.clientY - th - offY;
  tip.style.left = left + "px";
  tip.style.top = top + "px";
}
let lastPointer = null;
let cellHoverEl = null;
function getCellHover() {
  if (!cellHoverEl) {
    cellHoverEl = el("div", { class: "cell-hover" });
    document.body.appendChild(cellHoverEl);
  }
  return cellHoverEl;
}
function hideCellHover() { if (cellHoverEl) cellHoverEl.style.display = "none"; }
function updateCellHover(ev, wrap) {
  if (drag) { hideCellHover(); return; }
  const noteTarget = ev.target && ev.target.closest && ev.target.closest(".note");
  if (noteTarget && wrap.contains(noteTarget)) { hideCellHover(); return; }
  const rect = wrap.getBoundingClientRect();
  const cellW = getCellW();
  const cellH = getCellH();
  const x = ev.clientX - rect.left;
  const y = ev.clientY - rect.top;
  const stepInBar = Math.floor(x / cellW);
  const rowIdx = Math.floor(y / cellH);
  const partHi = parseInt(wrap.dataset.partHi, 10);
  const partLo = parseInt(wrap.dataset.partLo, 10);
  const numRows = partHi - partLo + 1;
  if (stepInBar < 0 || stepInBar >= STEPS_PER_BAR || rowIdx < 0 || rowIdx >= numRows) {
    hideCellHover();
    return;
  }
  const hover = getCellHover();
  hover.style.display = "block";
  hover.style.left = (rect.left + stepInBar * cellW) + "px";
  hover.style.top = (rect.top + rowIdx * cellH) + "px";
  hover.style.width = cellW + "px";
  hover.style.height = cellH + "px";
}
function updateNoteCursor(ev) {
  if (drag) return;
  const noteTarget = ev.target && ev.target.closest && ev.target.closest(".note");
  if (!noteTarget) return;
  const rect = noteTarget.getBoundingClientRect();
  const relLeft = ev.clientX - rect.left;
  const relRight = rect.right - ev.clientX;
  const len = parseInt(noteTarget.dataset.len, 10) || 1;
  const canResizeLeft = len > 1 && relLeft <= RESIZE_EDGE;
  const canResizeRight = relRight <= RESIZE_EDGE;
  noteTarget.style.cursor = (canResizeLeft || canResizeRight) ? "ew-resize" : "";
}
document.addEventListener("pointermove", (ev) => {
  lastPointer = { clientX: ev.clientX, clientY: ev.clientY };
  if (drag && drag.mode === "rubber-band") {
    hideCellTooltip(); hideCellHover();
    return;
  }
  let wrap;
  if (drag && drag.wrap) {
    wrap = drag.wrap;
  } else {
    wrap = ev.target && ev.target.closest && ev.target.closest(".grid-wrap");
  }
  if (!wrap) { hideCellTooltip(); hideCellHover(); return; }
  showCellTooltipAt(ev, wrap);
  updateCellHover(ev, wrap);
  updateNoteCursor(ev);
});
function refreshCellTooltipAtLastPointer() {
  if (!lastPointer) return;
  const elAtPoint = document.elementFromPoint(lastPointer.clientX, lastPointer.clientY);
  const wrap = elAtPoint && elAtPoint.closest && elAtPoint.closest(".grid-wrap");
  if (!wrap) { hideCellTooltip(); hideCellHover(); return; }
  const fakeEv = { clientX: lastPointer.clientX, clientY: lastPointer.clientY, target: elAtPoint };
  showCellTooltipAt(fakeEv, wrap);
  updateCellHover(fakeEv, wrap);
}
document.documentElement.addEventListener("pointerleave", () => { hideCellTooltip(); hideCellHover(); });
window.addEventListener("blur", () => { hideCellTooltip(); hideCellHover(); });

// ---------- Clipboard (copy/paste) ----------
let clipboard = null;
// shape: {
//   notes: [{ key, dStart, dRow, length, vel }, ...],
//   annotations: [{ text, noteKeys: [key, ...] }, ...]
// }
// `key` is the source note's id at copy time. Annotations refer to copied
// notes by key so paste can rebind them to freshly-minted ids.

function cutSelection(sheet) {
  if (!sheet || sheet.selectedNoteIds.size === 0) return;
  copySelection(sheet);
  removeNotesByIds(sheet, sheet.selectedNoteIds);
  clearSelection(sheet);
  sheet.selectedCell = null;
  renderAll();
  persist();
}

function copySelection(sheet) {
  if (!sheet || sheet.selectedNoteIds.size === 0) return;
  const ids = sheet.selectedNoteIds;
  const picked = [];
  for (const b of sheet.bars) {
    for (const n of b.notes) {
      if (ids.has(n.id)) picked.push(n);
    }
  }
  if (picked.length === 0) return;
  let minStart = Infinity, maxPitch = -Infinity;
  for (const n of picked) {
    if (n.start < minStart) minStart = n.start;
    if (n.pitch > maxPitch) maxPitch = n.pitch;
  }
  const pickedIdSet = new Set(picked.map(n => n.id));
  const annotations = [];
  for (const a of (sheet.annotations || [])) {
    const noteKeys = a.noteIds.filter(id => pickedIdSet.has(id));
    if (noteKeys.length > 0) annotations.push({ text: a.text, noteKeys });
  }
  clipboard = {
    notes: picked.map(n => ({
      key: n.id,
      dStart: n.start - minStart,
      dRow: maxPitch - n.pitch,
      length: n.length,
      vel: n.vel,
    })),
    annotations,
  };
}

async function pasteClipboard(sheet) {
  if (!sheet || !clipboard || clipboard.notes.length === 0) return;

  let targetBarIndex = -1, targetStep = 0, targetPitch = 0, targetPart = null;

  if (sheet.selectedNoteIds.size > 1) {
    // Multi-note: delete first, anchor at deleted bounding-box top-left.
    const ids = sheet.selectedNoteIds;
    let minStart = Infinity, maxPitch = -Infinity;
    let foundBar = null, foundPartId = null;
    for (let bi = 0; bi < sheet.bars.length; bi++) {
      const b = sheet.bars[bi];
      for (const n of b.notes) {
        if (!ids.has(n.id)) continue;
        if (n.start < minStart) minStart = n.start;
        if (n.pitch > maxPitch) maxPitch = n.pitch;
        if (foundBar === null) { foundBar = b; targetBarIndex = bi; foundPartId = n.partId; }
      }
    }
    if (foundBar === null) return;
    targetPart = sheet.parts.find(p => p.id === foundPartId);
    if (!targetPart) return;
    targetStep = minStart;
    targetPitch = maxPitch;
    // Delete the selection
    removeNotesByIds(sheet, ids);
    sheet.selectedNoteIds = new Set();
  } else if (sheet.selectedNoteIds.size === 1) {
    const onlyId = sheet.selectedNoteIds.values().next().value;
    let foundNote = null;
    for (let bi = 0; bi < sheet.bars.length; bi++) {
      const b = sheet.bars[bi];
      const n = b.notes.find(x => x.id === onlyId);
      if (n) { foundNote = n; targetBarIndex = bi; break; }
    }
    if (!foundNote) return;
    targetPart = sheet.parts.find(p => p.id === foundNote.partId);
    if (!targetPart) return;
    targetStep = foundNote.start;
    targetPitch = foundNote.pitch;
  } else if (sheet.selectedCell) {
    const c = sheet.selectedCell;
    targetBarIndex = sheet.bars.findIndex(b => b.id === c.barId);
    if (targetBarIndex < 0) return;
    targetPart = sheet.parts.find(p => p.id === c.partId);
    if (!targetPart) return;
    targetStep = c.step;
    targetPitch = c.pitch;
  } else {
    return; // nothing selected
  }

  const newIds = [];
  const keyToNewId = new Map();
  let outOfRangeMin = Infinity, outOfRangeMax = -Infinity, outOfRangeCount = 0;
  for (const cn of clipboard.notes) {
    const absStart = targetBarIndex * STEPS_PER_BAR + targetStep + cn.dStart;
    const newPitch = targetPitch - cn.dRow;
    const newBarIx = Math.floor(absStart / STEPS_PER_BAR);
    const stepInBar = absStart - newBarIx * STEPS_PER_BAR;
    if (newBarIx < 0 || newBarIx >= sheet.bars.length) continue;
    if (newPitch < PIANO_MIN || newPitch > PIANO_MAX) continue;
    let newLength = Math.min(cn.length, STEPS_PER_BAR - stepInBar);
    if (newLength < 1) newLength = 1;
    const note = {
      id: uid(),
      partId: targetPart.id,
      pitch: newPitch,
      start: stepInBar,
      length: newLength,
      vel: cn.vel,
    };
    sheet.bars[newBarIx].notes.push(note);
    newIds.push(note.id);
    if (cn.key != null) keyToNewId.set(cn.key, note.id);
    if (newPitch < targetPart.lo || newPitch > targetPart.hi) {
      outOfRangeCount++;
      if (newPitch < outOfRangeMin) outOfRangeMin = newPitch;
      if (newPitch > outOfRangeMax) outOfRangeMax = newPitch;
    }
  }

  // Recreate annotations bound to the surviving pasted notes. Annotations
  // whose noteKeys all dropped out of range are not recreated.
  if (newIds.length > 0 && Array.isArray(clipboard.annotations)) {
    for (const ca of clipboard.annotations) {
      const mapped = ca.noteKeys.map(k => keyToNewId.get(k)).filter(Boolean);
      if (mapped.length === 0) continue;
      sheet.annotations.push({ id: uid(), text: ca.text, noteIds: mapped });
    }
  }

  sheet.selectedCell = null;
  sheet.selectedNoteIds = new Set(newIds);
  renderAll();
  persist();

  if (outOfRangeCount > 0) {
    const newLo = Math.min(targetPart.lo, outOfRangeMin);
    const newHi = Math.max(targetPart.hi, outOfRangeMax);
    const noun = outOfRangeCount === 1 ? "note falls" : "notes fall";
    const msg = `${outOfRangeCount} pasted ${noun} outside "${targetPart.name}"'s pitch range (${pitchName(targetPart.lo)}–${pitchName(targetPart.hi)}). Extend the range to ${pitchName(newLo)}–${pitchName(newHi)} so they become visible?`;
    const ok = await confirmAsync(msg);
    if (ok) {
      targetPart.lo = newLo;
      targetPart.hi = newHi;
      renderAll();
      persist();
    }
  }
}

// ---------- Keyboard ----------
document.addEventListener("keydown", (ev) => {
  const t = ev.target;
  if (t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.isContentEditable)) return;

  if (isCreateModifier(ev) && (ev.key === "c" || ev.key === "C")) {
    const sec = project.sheets.find(s => s.id === lastFocusedSheetId) || project.sheets[0];
    if (!sec) return;
    copySelection(sec);
    ev.preventDefault();
    return;
  }
  if (isCreateModifier(ev) && (ev.key === "x" || ev.key === "X")) {
    const sec = project.sheets.find(s => s.id === lastFocusedSheetId) || project.sheets[0];
    if (!sec) return;
    cutSelection(sec);
    ev.preventDefault();
    return;
  }
  if (isCreateModifier(ev) && (ev.key === "a" || ev.key === "A")) {
    annotationsVisible = !annotationsVisible;
    renderAll();
    ev.preventDefault();
    return;
  }
  if (isCreateModifier(ev) && (ev.key === "v" || ev.key === "V")) {
    const sec = project.sheets.find(s => s.id === lastFocusedSheetId) || project.sheets[0];
    if (!sec) return;
    pasteClipboard(sec);
    ev.preventDefault();
    return;
  }

  if (ev.key !== "Backspace" && ev.key !== "Delete") return;
  const sec = project.sheets.find(s => s.id === lastFocusedSheetId) || project.sheets[0];
  if (!sec || sec.selectedNoteIds.size === 0) return;
  const removed = removeNotesByIds(sec, sec.selectedNoteIds);
  if (removed > 0) {
    clearSelection(sec);
    sec.selectedCell = null;
    renderAll();
    ev.preventDefault();
  }
});

// Document-level pointerdown: initiate a global rubber-band when the press
// lands outside any grid-wrap (page background, between sheets, sheet header,
// margins). Wrap handlers take precedence and pre-set `drag` for in-wrap presses.
document.addEventListener("pointerdown", (ev) => {
  if (drag) return;
  if (ev.button !== 0) return;
  const t = ev.target;
  if (!t || !t.closest) return;
  if (t.closest(".toolbar")) return;
  if (t.closest("dialog")) return;
  if (t.closest(".tabstrip")) return;
  if (t.closest(".ctx-menu")) return;
  if (t.closest(".annot-card")) return;
  if (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.tagName === "SELECT" || t.tagName === "OPTION" || t.isContentEditable) return;
  if (t.tagName === "BUTTON") return;
  if (t.closest("label")) return;
  if (t.closest(".note")) return;
  if (t.closest(".grid-wrap")) return;
  if (t.closest(".ruler-track")) return;
  const sheetEl = t.closest(".sheet");
  let sheet;
  if (sheetEl) {
    sheet = project.sheets.find(s => s.id === sheetEl.dataset.sheetId);
    lastFocusedSheetId = sheetEl.dataset.sheetId;
  } else {
    sheet = project.sheets.find(s => s.id === lastFocusedSheetId) || project.sheets[0];
  }
  if (!sheet) return;
  startGlobalRubberBand({ sheet, additive: ev.shiftKey, anchorX: ev.clientX, anchorY: ev.clientY });
  ev.preventDefault();
});

// click empty area within a sheet deselects that sheet's note
sheetsEl.addEventListener("pointerdown", (ev) => {
  if (ev.target.closest(".note") || ev.target.closest(".grid-wrap")) return;
  const sec = ev.target.closest(".sheet");
  if (!sec) return;
  const id = sec.dataset.sheetId;
  const s = project.sheets.find(x => x.id === id);
  if (!s) return;
  let changed = false;
  if (s.selectedNoteIds.size > 0) { clearSelection(s); changed = true; }
  if (s.selectedCell) { s.selectedCell = null; changed = true; }
  if (changed) renderAll();
});

document.getElementById("btn-save").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(serializeProject(project), null, 2)], { type: "application/json" });
  const safe = (project.name || "score").trim().replace(/[\\/:*?"<>|]+/g, "_") || "score";
  triggerDownload(blob, safe + ".json");
});
document.getElementById("btn-load").addEventListener("click", () => document.getElementById("file-load").click());
document.getElementById("file-load").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const fr = new FileReader();
  fr.onload = () => {
    try {
      const parsed = JSON.parse(fr.result);
      if (parsed && parsed.version !== 1 && parsed.version !== SCHEMA_VERSION) {
        throw new Error(`Unsupported schema version ${parsed.version} (expected ${SCHEMA_VERSION})`);
      }
      const obj = deserializeProject(parsed);
      if (!obj) throw new Error("Invalid format");
      project.name = obj.name || "";
      project.sheets = obj.sheets;
      activeSheetId = project.sheets[0]?.id ?? null;
      lastFocusedSheetId = activeSheetId;
      syncProjectNameInput();
      renderAll();
    } catch (err) {
      alert("Failed to load JSON: " + err.message);
    }
  };
  fr.readAsText(file);
  e.target.value = "";
});


function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ---------- Playback (per sheet, exclusive) ----------
let masterGain = null;
let masterVolume = 1.0; // 0..1, runtime-only (not persisted)
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (!masterGain) {
    masterGain = audioCtx.createGain();
    masterGain.gain.value = masterVolume;
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
}

function teardownPlayback() {
  for (const fn of activeOscillators) fn();
  activeOscillators = [];
  if (playStopTimer) { clearTimeout(playStopTimer); playStopTimer = null; }
  if (playbackRaf) { cancelAnimationFrame(playbackRaf); playbackRaf = null; }
}

function stopPlayback() {
  // Full stop: clear playing and paused state. sheet.playStart unchanged.
  teardownPlayback();
  playingSheetId = null;
  pausedSheetId = null;
  pausedStep = 0;
  renderAll();
}

const playbackEndedNaturally = stopPlayback;

function pausePlayback() {
  if (!playingSheetId || !audioCtx) return;
  const elapsed = audioCtx.currentTime - playbackT0;
  const step = playbackStartStep + Math.max(0, elapsed) / playbackSecPerStep;
  const clamped = Math.max(0, Math.min(playbackTotalSteps - 0.0001, step));
  teardownPlayback();
  pausedSheetId = playingSheetId;
  pausedStep = clamped;
  playingSheetId = null;
  renderAll();
}

function resumePlayback(sheet) {
  const fromStep = Math.floor(pausedStep);
  pausedSheetId = null;
  pausedStep = 0;
  playSheet(sheet, fromStep);
}

function scheduleNote(when, durSec, midi, vel) {
  const freq = 440 * Math.pow(2, (midi - 69) / 12);
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "triangle";
  osc.frequency.setValueAtTime(freq, when);
  const peak = VEL_GAIN[vel];
  gain.gain.setValueAtTime(0, when);
  gain.gain.linearRampToValueAtTime(peak, when + 0.005);
  gain.gain.setValueAtTime(peak, when + Math.max(0.01, durSec - 0.04));
  gain.gain.linearRampToValueAtTime(0, when + durSec);
  osc.connect(gain).connect(masterGain || audioCtx.destination);
  osc.start(when);
  osc.stop(when + durSec + 0.02);
  activeOscillators.push(() => { try { osc.stop(); osc.disconnect(); gain.disconnect(); } catch {} });
}

function playSheet(sheet, fromStep) {
  ensureAudio();
  // exclusive: stop any current playback (playing or paused)
  teardownPlayback();
  pausedSheetId = null;
  pausedStep = 0;
  playingSheetId = sheet.id;
  const secPerStep = 60 / sheet.bpm / 4;
  const totalSteps = sheet.bars.length * STEPS_PER_BAR;
  const wantedStart = (fromStep != null) ? fromStep : (sheet.playStart || 0);
  const startStep = Math.max(0, Math.min(totalSteps - 1, wantedStart));
  // Wrap to 0 if cursor is past the end
  const effectiveStart = startStep >= totalSteps ? 0 : startStep;
  const t0 = audioCtx.currentTime + 0.05;
  let lastEnd = t0;
  sheet.bars.forEach((bar, bi) => {
    for (const n of bar.notes) {
      const absStart = bi * STEPS_PER_BAR + n.start;
      if (absStart < effectiveStart) continue;
      const start = t0 + (absStart - effectiveStart) * secPerStep;
      const dur = n.length * secPerStep * 0.95;
      scheduleNote(start, dur, n.pitch, n.vel);
      if (start + dur > lastEnd) lastEnd = start + dur;
    }
  });
  playbackT0 = t0;
  playbackStartStep = effectiveStart;
  playbackSecPerStep = secPerStep;
  playbackTotalSteps = totalSteps;
  const endStepTime = t0 + (totalSteps - effectiveStart) * secPerStep;
  const endTime = Math.max(lastEnd, endStepTime);
  const totalMs = Math.max(100, (endTime - audioCtx.currentTime) * 1000 + 100);
  const myId = sheet.id;
  playStopTimer = setTimeout(() => { if (playingSheetId === myId) playbackEndedNaturally(); }, totalMs);

  const tick = () => {
    if (playingSheetId !== sheet.id || !audioCtx) return;
    // Only animate DOM when the playing sheet is the visible tab; the
    // other tab's DOM has the same selectors and would otherwise animate too.
    if (activeSheetId === sheet.id) {
      const elapsed = audioCtx.currentTime - playbackT0;
      const cur = playbackStartStep + Math.max(0, elapsed) / playbackSecPerStep;
      if (cur >= playbackTotalSteps) {
        updatePlaybackPlayhead(playbackTotalSteps - 0.0001, sheet);
      } else {
        updatePlaybackPlayhead(cur, sheet);
      }
    }
    playbackRaf = requestAnimationFrame(tick);
  };
  renderAll();
  playbackRaf = requestAnimationFrame(tick);
}

// ---------- MIDI export (per sheet) ----------
function writeVarLen(n) {
  const bytes = [n & 0x7f];
  n >>= 7;
  while (n > 0) { bytes.unshift((n & 0x7f) | 0x80); n >>= 7; }
  return bytes;
}
function strBytes(s) { return Array.from(new TextEncoder().encode(s)); }

function buildSheetTrack(sheet, part, isFirstTrack) {
  const events = [];
  if (isFirstTrack) {
    const mpq = Math.round(60000000 / sheet.bpm);
    events.push({ tick: 0, order: 0, bytes: [0xff, 0x51, 0x03, (mpq >> 16) & 0xff, (mpq >> 8) & 0xff, mpq & 0xff] });
  }
  const nameBytes = strBytes(part.name);
  events.push({ tick: 0, order: 0, bytes: [0xff, 0x03, nameBytes.length, ...nameBytes] });
  sheet.bars.forEach((bar, bi) => {
    for (const n of bar.notes) {
      if (n.partId !== part.id) continue;
      const onTick = (bi * STEPS_PER_BAR + n.start) * TICKS_PER_STEP;
      const offTick = (bi * STEPS_PER_BAR + n.start + n.length) * TICKS_PER_STEP;
      events.push({ tick: onTick, order: 1, bytes: [0x90, n.pitch, VEL_MIDI[n.vel]] });
      events.push({ tick: offTick, order: 0, bytes: [0x80, n.pitch, 0] });
    }
  });
  events.sort((a, b) => a.tick - b.tick || a.order - b.order);
  const lastTick = events.length ? events[events.length - 1].tick : 0;
  events.push({ tick: lastTick, order: 2, bytes: [0xff, 0x2f, 0x00] });
  const out = [];
  let prev = 0;
  for (const e of events) {
    const delta = e.tick - prev;
    prev = e.tick;
    out.push(...writeVarLen(delta), ...e.bytes);
  }
  return out;
}

function exportSheetMidi(sheet) {
  const tracks = sheet.parts.map((p, i) => buildSheetTrack(sheet, p, i === 0));
  const numTracks = tracks.length;
  const header = [
    0x4d, 0x54, 0x68, 0x64, 0, 0, 0, 6, 0, 1,
    (numTracks >> 8) & 0xff, numTracks & 0xff,
    (TICKS_PER_QUARTER >> 8) & 0xff, TICKS_PER_QUARTER & 0xff,
  ];
  const bytes = [...header];
  for (const t of tracks) {
    bytes.push(0x4d, 0x54, 0x72, 0x6b);
    const len = t.length;
    bytes.push((len >> 24) & 0xff, (len >> 16) & 0xff, (len >> 8) & 0xff, len & 0xff);
    bytes.push(...t);
  }
  const blob = new Blob([new Uint8Array(bytes)], { type: "audio/midi" });
  const safe = (sheet.title || "sheet").replace(/[^a-z0-9_\-]+/gi, "_").slice(0, 40) || "sheet";
  triggerDownload(blob, `${safe}.mid`);
}

// ---------- Resize: re-flow bands ----------
let resizeTimer = null;
let lastN = barsPerBand();
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const n = barsPerBand();
    if (n !== lastN) { lastN = n; renderAll(); }
  }, 120);
});

// ---------- Init ----------
renderAll();

})();
</script>
