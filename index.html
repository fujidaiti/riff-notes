<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sheet Grid MIDI Editor</title>
<style>
  :root {
    --cell-w: 22px;
    --cell-h: 22px;
    --bg: #fafaf7;
    --ink: #222;
    --ink-soft: #555;
    --ink-muted: #888;
    --ink-faint: #aaa;
    --line: #d2d2cc;
    --line-soft: #f0f0ec;
    --line-strong: #555;
    --note: #c97a4a;
    --note-in-scale: #6ba84a;
    --note-sel: #2b6cb0;
    --note-hover: #0aa39b;
    --sheet-bg: #ffffff;
    --sheet-border: #e2e2dc;
    --panel-bg: #f1f0ea;
    --panel-hover: #ebebe2;
    --input-bg: #ffffff;
    --placeholder: #c8c8c0;
    --grid-line: #cdcdc4;
    --grid-line-soft: #ececea;
    --ruler-bg: #f5f5ef;
    --ruler-bg-hover: #ecece6;
    --ruler-tick: #b8b8af;
    --ruler-tick-soft: #d6d6cd;
    --playhead: #d97a3a;
    --playhead-line: rgba(217, 122, 58, 0.85);
    --tooltip-bg: #ffffff;
    --tooltip-ink: #333;
    --tooltip-muted: #888;
    --menu-bg: #ffffff;
    --menu-border: #aaa;
    --menu-hover: #eef2ff;
    --annot-bg: #ffffff;
    --annot-border: #aaa;
    --annot-ink: #222;
    --annot-line: #555;
    --backdrop: rgba(0,0,0,0.25);
    --shadow-soft: rgba(0,0,0,0.12);
    --shadow-med: rgba(0,0,0,0.18);
    --note-inset: rgba(0,0,0,0.15);
    --play-tint: #ffe6c2;
    --kbd-ink: #333;
  }
  [data-theme="dark"] {
    --bg: #16161a;
    --ink: #e8e8e3;
    --ink-soft: #b8b8b0;
    --ink-muted: #8a8a84;
    --ink-faint: #6a6a64;
    --line: #3a3a40;
    --line-soft: #232328;
    --line-strong: #c8c8c0;
    --note: #d98a55;
    --note-in-scale: #7ec25a;
    --note-sel: #6aa3e0;
    --note-hover: #2bc4ba;
    --sheet-bg: #1e1e22;
    --sheet-border: #2e2e34;
    --panel-bg: #25252b;
    --panel-hover: #2e2e36;
    --input-bg: #2a2a30;
    --placeholder: #55555a;
    --grid-line: #34343a;
    --grid-line-soft: #25252b;
    --ruler-bg: #232328;
    --ruler-bg-hover: #2c2c32;
    --ruler-tick: #5a5a52;
    --ruler-tick-soft: #3a3a36;
    --playhead: #e89556;
    --playhead-line: rgba(232, 149, 86, 0.85);
    --tooltip-bg: #2a2a30;
    --tooltip-ink: #e8e8e3;
    --tooltip-muted: #9a9a94;
    --menu-bg: #25252b;
    --menu-border: #44444a;
    --menu-hover: #34344a;
    --annot-bg: #25252b;
    --annot-border: #44444a;
    --annot-ink: #e8e8e3;
    --annot-line: #b8b8b0;
    --backdrop: rgba(0,0,0,0.55);
    --shadow-soft: rgba(0,0,0,0.45);
    --shadow-med: rgba(0,0,0,0.6);
    --note-inset: rgba(0,0,0,0.35);
    --play-tint: #5a3a1c;
    --kbd-ink: #e0e0d8;
  }
  * { box-sizing: border-box; }
  html { color-scheme: light; }
  html[data-theme="dark"] { color-scheme: dark; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; overscroll-behavior-x: none; }
  body { padding-bottom: 80px; }

  /* Global toolbar */
  .toolbar {
    position: sticky; top: 0; z-index: 20;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    padding: 8px 12px; background: var(--panel-bg);
    border-bottom: 1px solid var(--line);
  }
  .toolbar button, .toolbar input, .toolbar select { font-size: 13px; padding: 4px 8px; }
  .toolbar button { cursor: pointer; }
  .project-name {
    font-size: 15px; font-weight: 600;
    border: 1px solid transparent; background: transparent;
    border-radius: 4px; padding: 4px 6px; min-width: 160px;
  }
  .project-name:hover, .project-name:focus { border-color: var(--line); background: var(--input-bg); outline: none; }
  .volume-control { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-soft); }
  .volume-control input[type=range] { width: 100px; padding: 0; }
  .volume-value { font-variant-numeric: tabular-nums; min-width: 36px; text-align: right; }
  .spacer { flex: 1; }
  .hint { font-size: 11px; color: var(--ink-soft); padding: 6px 12px; }

  /* Tab strip */
  .tabstrip {
    position: sticky; top: 41px; z-index: 19;
    display: flex; align-items: flex-end; gap: 2px;
    padding: 6px 12px 0;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
    overflow-y: hidden;
  }
  .tab {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    background: var(--panel-bg);
    border: 1px solid var(--line);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    font-size: 13px;
    color: var(--ink-soft);
    max-width: 220px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    user-select: none;
    margin-bottom: -1px;
  }
  .tab:hover { background: var(--panel-hover); }
  .tab.active {
    background: var(--sheet-bg);
    color: var(--ink);
    border-color: var(--line);
    border-bottom: 1px solid var(--sheet-bg);
    font-weight: 600;
  }
  .tab .tab-label { overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .tab .tab-playing { color: var(--playhead); font-size: 11px; }
  .tab-add {
    padding: 6px 10px;
    background: transparent;
    border: 1px dashed var(--line);
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: -1px;
  }
  .tab-add:hover { background: var(--panel-bg); color: var(--ink); }

  /* Sheet */
  .sheets { padding: 12px; display: flex; flex-direction: column; gap: 14px; }
  .sheet {
    background: var(--sheet-bg);
    border: 1px solid var(--sheet-border);
    border-radius: 6px;
    padding: 10px;
  }
  .sheet-header { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .sheet-meta-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .sheet-meta-row label { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--ink-soft); }
  .sheet-meta-row input[type=number] { width: 60px; }
  .sheet-title { font-size: 15px; font-weight: 600; padding: 4px 6px; border: 1px solid transparent; border-radius: 4px; flex: 1 1 220px; min-width: 160px; }
  .sheet-title:focus, .sheet-title:hover { border-color: var(--line); background: var(--input-bg); }
  .sheet-notes { width: 100%; min-height: 36px; resize: vertical; padding: 4px 6px; font-family: inherit; font-size: 12px; border: 1px solid var(--line); border-radius: 4px; }
  .sheet-actions { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .sheet-actions button { font-size: 12px; padding: 3px 10px; cursor: pointer; }
  .sheet-actions button.play.playing { background: var(--play-tint); }

  /* Parts panel (per-sheet) */
  .parts-panel { background: var(--panel-bg); border: 1px solid var(--line); border-radius: 4px; padding: 8px; margin-top: 6px; }
  .parts-panel.hidden { display: none; }
  .parts-panel h4 { margin: 0 0 6px; font-size: 12px; color: var(--ink-soft); }
  .part-row { display: flex; gap: 6px; align-items: center; margin-bottom: 4px; }
  .part-row input[type=text] { flex: 0 0 160px; }
  .part-row button { font-size: 11px; padding: 2px 6px; cursor: pointer; }
  .range-controls { display: inline-flex; align-items: center; gap: 2px; }
  .range-controls select { font-size: 12px; padding: 1px 2px; }
  .range-controls .range-sep { color: var(--ink-muted); padding: 0 4px; }

  /* Bands of bars */
  .bands { display: flex; flex-direction: column; align-items: flex-start; gap: 100px; margin-top: 10px; position: relative; overflow-x: auto; overflow-y: hidden; overscroll-behavior-x: contain; }
  .band {
    display: grid;
    grid-template-columns: 36px auto;
    gap: 4px;
    align-items: stretch;
  }
  .band-left-rail {
    grid-column: 1;
    position: sticky;
    left: 0;
    background: var(--panel-bg);
    border-right: 1px solid var(--line);
    z-index: 6;
  }
  .band-bar-numbers {
    grid-column: 2;
    display: grid;
    font-size: 10px;
    color: var(--ink-muted);
  }
  .band-bar-numbers > span { padding: 1px 4px; }
  .band-row {
    grid-column: 1 / span 2;
    display: grid;
    grid-template-columns: 36px auto;
    gap: 4px;
    align-items: center;
  }
  .band-row + .band-row { margin-top: 4px; }
  .bar-grid { display: flex; flex-direction: row; align-items: stretch; }
  .part-side {
    grid-column: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 10px;
    color: var(--ink-soft);
    padding: 4px 0;
    line-height: 1.1;
    user-select: none;
    position: sticky;
    left: 0;
    background: transparent;
    z-index: 7;
  }
  .part-side .part-name {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
  }
  .part-rec-btn {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--input-bg);
    color: #d23;
    font-size: 11px;
    line-height: 1;
    padding: 0;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .part-rec-btn:hover:not(:disabled) { border-color: #d23; }
  .part-rec-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .part-rec-btn.recording { background: #d23; color: #fff; border-color: #d23; animation: rec-pulse 1s ease-in-out infinite; }
  .part-rec-btn.count-in { background: #f5a623; color: #fff; border-color: #f5a623; animation: rec-pulse 0.6s ease-in-out infinite; }
  @keyframes rec-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .grid-wrap {
    position: relative;
    background: var(--sheet-bg);
    border: 1px solid var(--line);
  }
  .grid-wrap::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(to right, var(--line-strong) 1px, transparent 1px),
      linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
      linear-gradient(to right, var(--grid-line-soft) 1px, transparent 1px);
    background-size:
      calc(var(--cell-w) * 16) 100%,
      calc(var(--cell-w) * 4) 100%,
      var(--cell-w) 100%;
    background-position: 0 0, 0 0, 0 0;
  }
  .grid-row {
    position: relative;
    height: var(--cell-h);
  }
  .band-ruler {
    grid-column: 2;
    margin-top: 2px;
  }
  .ruler-track {
    position: relative;
    height: 10px;
    background-color: var(--ruler-bg);
    background-image:
      linear-gradient(to right, var(--line-strong) 1px, transparent 1px),
      linear-gradient(to right, var(--ruler-tick) 1px, transparent 1px),
      linear-gradient(to right, var(--ruler-tick-soft) 1px, transparent 1px);
    background-size:
      calc(var(--cell-w) * 16) 100%,
      calc(var(--cell-w) * 4) 100%,
      var(--cell-w) 100%;
    background-position: 0 0, 0 0, 0 0;
    background-repeat: repeat-x;
    border: 1px solid var(--line);
    border-radius: 2px;
    cursor: pointer;
  }
  .ruler-track:hover { background-color: var(--ruler-bg-hover); }
  .playhead-marker {
    position: absolute;
    top: -2px; bottom: -2px;
    width: 0; height: 0;
    pointer-events: none;
  }
  .playhead-marker::before {
    content: "";
    position: absolute;
    left: -4px; top: -3px;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 5px solid var(--playhead);
  }
  .playhead-marker::after {
    content: "";
    position: absolute;
    left: -1px; top: 0;
    width: 2px; height: 14px;
    background: var(--playhead);
  }
  .playhead-marker.dim { opacity: 0.35; }
  .playhead-line {
    position: absolute;
    top: 0; bottom: 0;
    width: 2px;
    margin-left: -1px;
    background: var(--playhead-line);
    pointer-events: none;
    z-index: 4;
    display: none;
  }
  .playhead-line.active { display: block; }
  .note {
    position: absolute;
    height: calc(var(--cell-h) - 2px);
    top: 1px;
    background: var(--note);
    border-radius: 2px;
    cursor: grab;
    box-shadow: inset 0 0 0 1px var(--note-inset);
    touch-action: none;
    z-index: 1;
  }
  .note.in-scale { background: var(--note-in-scale); }
  .note.drum-hihat { background: #e3c44a; }
  .note.drum-snare { background: #d24a4a; }
  .note.drum-kick  { background: #9056c8; }
  .note.selected { outline: 2px solid var(--note-sel); outline-offset: 1px; z-index: 3; }
  .note:hover:not(.selected) { outline: 2px solid var(--note-hover); outline-offset: 1px; z-index: 2; }
  .note-label {
    position: absolute;
    pointer-events: none;
    font-size: 10px;
    font-weight: 600;
    line-height: 1;
    color: rgba(0, 0, 0, 0.55);
    white-space: nowrap;
    text-align: center;
    z-index: 2;
  }
  .cell-hover {
    position: fixed;
    pointer-events: none;
    box-sizing: border-box;
    border: 2px solid var(--note-hover);
    border-radius: 2px;
    z-index: 1;
    display: none;
  }
  .rubber-band {
    position: fixed;
    pointer-events: none;
    box-sizing: border-box;
    border: 1px solid var(--note-hover);
    background: rgba(10, 163, 155, 0.12);
    z-index: 9998;
  }
  .cell-selected {
    position: absolute;
    pointer-events: none;
    box-sizing: border-box;
    border: 2px solid var(--note-sel);
    border-radius: 2px;
    background: rgba(43, 108, 176, 0.10);
    z-index: 1;
  }

  .cell-tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--tooltip-bg);
    border: 1px solid var(--line);
    border-radius: 4px;
    box-shadow: 0 2px 6px var(--shadow-soft);
    padding: 3px 6px;
    font-size: 11px;
    line-height: 1.3;
    color: var(--tooltip-ink);
    z-index: 9999;
    white-space: nowrap;
    display: none;
  }
  .cell-tooltip .pitch { font-weight: 600; }
  .cell-tooltip .vel { color: var(--tooltip-muted); margin-left: 6px; }
  .cell-tooltip .len { color: var(--tooltip-muted); margin-left: 6px; }
  /* Annotations */
  .annot-overlay {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  body.dragging-notes .annot-overlay { display: none; }
  .annot-overlay svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
    z-index: 5;
  }
  .annot-line {
    stroke: var(--annot-line); stroke-width: 2; fill: none;
    opacity: 0.28; transition: opacity 80ms;
  }
  .annot-line.active { opacity: 0.9; }
  .annot-card {
    position: absolute;
    background: var(--annot-bg);
    border: 1px solid var(--annot-border);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 11px;
    line-height: 1.3;
    color: var(--annot-ink);
    opacity: 0.6;
    pointer-events: auto;
    cursor: default;
    white-space: nowrap;
    user-select: none;
    transition: opacity 80ms;
    max-width: 320px;
    overflow: hidden;
    text-overflow: ellipsis;
    box-sizing: border-box;
    z-index: 5;
  }
  .annot-card.annot-side-top    { transform: translate(-50%, -100%); transform-origin: bottom center; }
  .annot-card.annot-side-bottom { transform: translate(-50%, 0);     transform-origin: top center; }
  .annot-card.active { opacity: 1; box-shadow: 0 2px 8px var(--shadow-med); }
  .annot-card.expanded {
    white-space: pre-wrap;
    word-break: break-word;
    z-index: 30;
    width: auto;
    min-width: max(140px, var(--annot-shrunk-width, 140px));
    overflow: visible;
    cursor: grab;
  }
  .annot-card.annot-side-free   { transform: translate(0, 0); transform-origin: top left; }
  .annot-card.dragging {
    white-space: nowrap;
    min-width: 0;
    z-index: 6;
    cursor: grabbing;
    opacity: 1;
    box-shadow: 0 2px 8px var(--shadow-med);
  }
  .annot-card.dragging .annot-full,
  .annot-card.dragging .annot-actions { display: none !important; }
  .annot-card.dragging .annot-preview { display: inline !important; }
  .annot-card.resizing {
    white-space: nowrap;
    z-index: 6;
    cursor: ew-resize;
    opacity: 1;
    box-shadow: 0 2px 8px var(--shadow-med);
  }
  .annot-card.resizing .annot-full,
  .annot-card.resizing .annot-actions { display: none !important; }
  .annot-card.resizing .annot-preview { display: inline !important; }
  .annot-card .annot-actions {
    display: none;
    gap: 4px; margin-top: 6px; justify-content: flex-end;
  }
  .annot-card.expanded .annot-actions { display: flex; }
  .annot-card .annot-actions button {
    font-size: 11px; padding: 2px 6px; cursor: pointer;
  }
  .note.annot-active {
    outline: 2px solid var(--annot-line); outline-offset: 1px; z-index: 2;
  }
  .ctx-menu {
    position: fixed;
    background: var(--menu-bg);
    border: 1px solid var(--menu-border);
    border-radius: 4px;
    box-shadow: 0 4px 12px var(--shadow-med);
    padding: 4px 0;
    font-size: 12px;
    min-width: 160px;
    z-index: 10000;
    display: none;
  }
  .ctx-menu .ctx-item {
    padding: 4px 12px; cursor: pointer; white-space: nowrap;
  }
  .ctx-menu .ctx-item:hover { background: var(--menu-hover); }
  .ctx-menu .ctx-sep { height: 1px; background: var(--line); margin: 4px 0; }
  #annotation-dialog { max-width: 420px; }
  #annotation-dialog textarea {
    width: 100%; min-height: 120px; box-sizing: border-box;
    font: inherit; padding: 6px; resize: vertical;
  }
  #annotation-dialog .actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 10px; }
  #annotation-dialog .actions .del { margin-right: auto; }

  dialog { border: 1px solid var(--line); border-radius: 6px; padding: 14px; max-width: 360px; background: var(--sheet-bg); color: var(--ink); }
  dialog::backdrop { background: var(--backdrop); }
  .hidden { display: none; }
  #help-dialog { max-width: 520px; }
  #help-dialog h3 { margin: 0 0 10px; font-size: 14px; }
  #help-dialog table { border-collapse: collapse; width: 100%; font-size: 12px; }
  #help-dialog td { padding: 4px 8px; vertical-align: top; }
  #help-dialog td.key { white-space: nowrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--kbd-ink); }
  #help-dialog tr + tr td { border-top: 1px dashed var(--line); }
  #help-dialog .actions { display: flex; justify-content: flex-end; margin-top: 10px; }
  .btn-icon { padding: 4px 8px; cursor: pointer; }

</style>
<script>
  // Resolve theme before first paint to avoid a light-mode flash.
  (function () {
    try {
      var pref = localStorage.getItem("midi-editor:theme") || "auto";
      var dark = pref === "dark" || (pref === "auto" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
      document.documentElement.dataset.theme = dark ? "dark" : "light";
    } catch (e) {
      document.documentElement.dataset.theme = "light";
    }
  })();
</script>
</head>
<body>
<div class="toolbar">
  <input id="project-name" class="project-name" type="text" placeholder="Untitled project" autocomplete="off">
  <button id="btn-save">Save JSON</button>
  <button id="btn-load">Load JSON</button>
  <input type="file" id="file-load" accept="application/json,.json" class="hidden">
  <span class="spacer"></span>
  <label class="volume-control" title="Master volume">
    <span aria-hidden="true">🔊</span>
    <input id="volume-slider" type="range" min="0" max="100" value="100">
    <span class="volume-value" id="volume-value">100%</span>
  </label>
  <span class="hint" id="saved-indicator">Not saved yet</span>
  <button id="btn-theme" class="btn-icon" title="Theme">🌓</button>
  <button id="btn-help" class="btn-icon" title="Keyboard shortcuts">?</button>
</div>
<div class="tabstrip" id="tabstrip"></div>
<div class="sheets" id="sheets"></div>
<dialog id="help-dialog">
  <h3>Keyboard & mouse shortcuts</h3>
  <table id="help-table"></table>
  <div class="actions">
    <button id="help-close">Close</button>
  </div>
</dialog>
<dialog id="annotation-dialog">
  <h3 id="annotation-title" style="margin:0 0 8px; font-size:14px;">Annotation</h3>
  <textarea id="annotation-text" placeholder="Enter annotation text…" autocomplete="off"></textarea>
  <div class="actions">
    <button id="annotation-delete" class="del" type="button">Delete</button>
    <button id="annotation-cancel" type="button">Cancel</button>
    <button id="annotation-save" type="button">Save</button>
  </div>
</dialog>
<div id="ctx-menu" class="ctx-menu"></div>
<dialog id="confirm-dialog">
  <p id="confirm-message"></p>
  <div style="display:flex; gap:8px; justify-content:flex-end;">
    <button id="confirm-no">Cancel</button>
    <button id="confirm-yes">OK</button>
  </div>
</dialog>
<dialog id="alert-dialog">

const SCALES = {
  major: [0,2,4,5,7,9,11],
  minor: [0,2,3,5,7,8,10],
  harmonicMinor: [0,2,3,5,7,8,11],
  melodicMinor: [0,2,3,5,7,9,11],
  dorian: [0,2,3,5,7,9,10],

const RHYTHM_KEYS = ["hihat", "snare", "kick"];

  ["major", "Major"], ["minor", "Natural Minor"], ["harmonicMinor", "Harmonic Minor"],
  ["melodicMinor", "Melodic Minor"], ["dorian", "Dorian"], ["phrygian", "Phrygian"],
  ["lydian", "Lydian"], ["mixolydian", "Mixolydian"], ["locrian", "Locrian"],

// After a note-drag commit, if an annotation's anchor was in the moved set
// but at least one member was not, re-anchor to the earliest non-moved member
// and preserve the card's bands-relative visual position. Group moves (every
// member moved) leave (dx, dy) unchanged so the card follows the move.
function reconcileManualPlacementAfterMove(sheet, movedIdSet) {
  if (!sheet.annotations || sheet.annotations.length === 0) return;
  const sheetEl = sheetsEl && sheetsEl.querySelector(`[data-sheet-id="${sheet.id}"]`);
  const bandsEl = sheetEl && sheetEl.querySelector(".bands");
  if (!bandsEl) return;
  const bandsRect = bandsEl.getBoundingClientRect();
  const centerOf = (noteId) => {
    const elN = bandsEl.querySelector(`.note[data-note-id="${noteId}"]`);
    if (!elN) return null;
    const r = elN.getBoundingClientRect();
    return { x: (r.left + r.right) / 2 - bandsRect.left, y: (r.top + r.bottom) / 2 - bandsRect.top };
  };
  for (const a of sheet.annotations) {
    const mp = a.manualPlacement;
    if (!mp) continue;
    if (!movedIdSet.has(mp.anchorNoteId)) continue;
    if (a.noteIds.every(id => movedIdSet.has(id))) continue;
    const nonMoved = a.noteIds.filter(id => !movedIdSet.has(id));
    const candidates = nonMoved.map(id => ({ id, c: centerOf(id) })).filter(s => s.c);
    if (candidates.length === 0) continue;
    candidates.sort((p, q) => (p.c.x - q.c.x) || (p.c.y - q.c.y));
    const newAnchor = candidates[0];
    const cardEl = bandsEl.querySelector(`.annot-card[data-annotation-id="${a.id}"]`);
    if (!cardEl) continue;

    const oldCardY = parseFloat(cardEl.style.top);
    if (!Number.isFinite(oldCardX) || !Number.isFinite(oldCardY)) continue;
    a.manualPlacement = {
      anchorNoteId: newAnchor.id,
      dx: oldCardX - newAnchor.c.x,
      dy: oldCardY - newAnchor.c.y,
    };
  }
}

// For each annotation with a manualPlacement whose anchor is about to be
// deleted: pick the earliest surviving member as the new anchor and recompute
// (dx, dy) so the card's bands-relative visual position stays put.
function reconcileManualPlacementBeforeDelete(sheet, idSet) {
  if (!sheet.annotations || sheet.annotations.length === 0) return;
  const sheetEl = sheetsEl && sheetsEl.querySelector(`[data-sheet-id="${sheet.id}"]`);
  const bandsEl = sheetEl && sheetEl.querySelector(".bands");
  if (!bandsEl) return;
  const bandsRect = bandsEl.getBoundingClientRect();
  const centerOf = (noteId) => {
    const elN = bandsEl.querySelector(`.note[data-note-id="${noteId}"]`);
    if (!elN) return null;
    const r = elN.getBoundingClientRect();
    return { x: (r.left + r.right) / 2 - bandsRect.left, y: (r.top + r.bottom) / 2 - bandsRect.top };
  };
  for (const a of sheet.annotations) {
    const mp = a.manualPlacement;
    if (!mp) continue;
    if (!idSet.has(mp.anchorNoteId)) continue;
    const survivingIds = a.noteIds.filter(id => !idSet.has(id));
    if (survivingIds.length === 0) continue;
    const candidates = survivingIds
      .map(id => ({ id, c: centerOf(id) }))
      .filter(s => s.c);
    if (candidates.length === 0) { a.manualPlacement = null; continue; }
    candidates.sort((p, q) => (p.c.x - q.c.x) || (p.c.y - q.c.y));
    const newAnchor = candidates[0];
    const oldAnchorC = centerOf(mp.anchorNoteId);
    if (!oldAnchorC) {
      a.manualPlacement = { anchorNoteId: newAnchor.id, dx: mp.dx, dy: mp.dy };
      continue;
    }
    const oldCardX = oldAnchorC.x + mp.dx;
    const oldCardY = oldAnchorC.y + mp.dy;
    a.manualPlacement = {
      anchorNoteId: newAnchor.id,
      dx: oldCardX - newAnchor.c.x,
      dy: oldCardY - newAnchor.c.y,
    };
  }
}

// Remove notes whose ids are in `idSet` from every part of `sheet`, then prune
// any annotations whose noteIds become empty after the removal. Returns the
// number of notes actually removed.
function removeNotesByIds(sheet, idSet) {
  if (!idSet || idSet.size === 0) return 0;
  let removed = 0;
  for (const p of sheet.parts) {
    p.notes = p.notes.filter(n => {
      if (idSet.has(n.id)) { removed++; return false; }
      return true;
    });
  }
  if (sheet.annotations && sheet.annotations.length > 0) {
    reconcileManualPlacementBeforeDelete(sheet, idSet);
    sheet.annotations = sheet.annotations
      .map(a => {
        const noteIds = a.noteIds.filter(id => !idSet.has(id));
        let mp = a.manualPlacement;
        if (mp && !noteIds.includes(mp.anchorNoteId)) mp = null;
        return { ...a, noteIds, manualPlacement: mp };
      })
      .filter(a => a.noteIds.length > 0);
  }
  return removed;
}

const IS_MAC = /Mac|iPhone|iPad|iPod/.test(navigator.platform);

const project = { name: "", sheets: [makeSheet("Sheet 1")] };

let lastFocusedSheetId = project.sheets[0].id;
let annotationsVisible = true;

// ---------- Undo / redo history ----------
// In-memory only; covers note-mutating operations (create, move, resize,
// velocity cycle, cut, paste, delete, and the cascading note removals when a
// part or bar is deleted). Snapshots are full serialized projects so the
// restore path matches the "Load JSON" flow. Not persisted across reloads.
const HISTORY_CAP = 200;
const undoStack = [];
const redoStack = [];

function snapshotProject() {
  return serializeProject(project);
}
function commitUndoSnapshot(snap) {
  if (!snap) return;
  undoStack.push(snap);
  if (undoStack.length > HISTORY_CAP) undoStack.shift();
  redoStack.length = 0;
}
function pushUndo() {
  commitUndoSnapshot(snapshotProject());
}
function restoreSnapshot(snap) {
  const obj = deserializeProject(snap);
  if (!obj) return;
  project.name = obj.name || "";
  project.sheets = obj.sheets;
  if (!project.sheets.some(s => s.id === activeSheetId)) {
    activeSheetId = project.sheets[0].id;
  }
  lastFocusedSheetId = project.sheets.some(s => s.id === lastFocusedSheetId)
    ? lastFocusedSheetId
    : activeSheetId;
  renderAll();
}
function undo() {
  if (undoStack.length === 0) return;
  redoStack.push(snapshotProject());
  restoreSnapshot(undoStack.pop());
}
function redo() {
  if (redoStack.length === 0) return;
  undoStack.push(snapshotProject());
  restoreSnapshot(redoStack.pop());
}

// ---------- Persistence schema ----------
// The persisted document is intentionally decoupled from the runtime project
// model. View/runtime state (selectedNoteIds, partsPanelOpen, activeSheetId,
// playingSheetId, etc.) is never written. Bump SCHEMA_VERSION on breaking
// changes and add a migration branch in deserializeProject.
const SCHEMA_VERSION = 10;
const STORAGE_KEY = "midi-editor:state";

// Annotation card sizing — must be declared before serialize/deserialize
// since `restoreFromStorage` runs at top-level and would hit a TDZ otherwise.
const ANNOT_RESIZE_EDGE = 6;
const ANNOT_MIN_WIDTH = 24;
const ANNOT_MAX_WIDTH = 320;
const ANNOT_DEFAULT_SHRUNK_WIDTH = 140;

function serializeProject(p) {
  return {
    version: SCHEMA_VERSION,
    name: p.name || "",
    sheets: p.sheets.map(s => ({
      id: s.id,
      title: s.title,
      notes: s.notes,
      bpm: s.bpm,
      scale: { root: s.scale.root, mode: s.scale.mode },
      pitchDisplay: s.pitchDisplay || "note",
      barCount: Math.max(1, s.barCount | 0),
      parts: s.parts.map(pt => ({
        id: pt.id, name: pt.name, lo: pt.lo, hi: pt.hi, type: pt.type || "pitched",
        notes: pt.notes.map(n => ({
          id: n.id, partId: n.partId, pitch: n.pitch,
          start: n.start, length: n.length, vel: n.vel,
          subOffset: n.subOffset || 0,
          subLength: n.subLength || 0,
        })),
      })),
      annotations: (s.annotations || []).map(a => ({
        id: a.id, text: a.text, noteIds: [...a.noteIds],
        shrunkWidth: Number.isFinite(a.shrunkWidth) ? a.shrunkWidth : ANNOT_DEFAULT_SHRUNK_WIDTH,
        manualPlacement: a.manualPlacement
          ? { anchorNoteId: a.manualPlacement.anchorNoteId, dx: a.manualPlacement.dx, dy: a.manualPlacement.dy }
          : null,
      })),
    })),
  };
}

function deserializeProject(doc) {
  if (!doc || !Array.isArray(doc.sheets) || doc.sheets.length === 0) return null;
  if (doc.version !== SCHEMA_VERSION) return null;
  const sheets = doc.sheets.map(s => {
    const barCount = Math.max(1, Number.isFinite(s.barCount) ? (s.barCount | 0) : 1);
    return {
      id: s.id || uid(),
      title: typeof s.title === "string" ? s.title : "Sheet",
      notes: typeof s.notes === "string" ? s.notes : "",
      bpm: Number.isFinite(s.bpm) ? s.bpm : 120,
      scale: {
        root: Number.isFinite(s.scale?.root) ? s.scale.root : 0,
        mode: typeof s.scale?.mode === "string" ? s.scale.mode : "major",
      },
      pitchDisplay: s.pitchDisplay === "degree" ? "degree" : "note",
      barCount,
      parts: (Array.isArray(s.parts) && s.parts.length ? s.parts : [makePart("Part 1")])
        .map(pt => {
          const type = pt.type === "rhythm" ? "rhythm" : "pitched";
          const base = type === "rhythm"
            ? { id: pt.id || uid(), name: pt.name || "Rhythm", lo: 0, hi: 2, type }
            : { id: pt.id || uid(), name: pt.name || "Part", lo: pt.lo ?? 60, hi: pt.hi ?? 72, type };
          base.notes = Array.isArray(pt.notes) ? pt.notes.map(n => {
            let so = Number.isInteger(n.subOffset) ? n.subOffset : 0;
            if (so < -(SUB_PER_STEP - 1)) so = -(SUB_PER_STEP - 1);
            if (so >  (SUB_PER_STEP - 1)) so =  (SUB_PER_STEP - 1);
            let sl = Number.isInteger(n.subLength) ? n.subLength : 0;
            if (sl < 0) sl = 0;
            if (sl > SUB_PER_STEP - 1) sl = SUB_PER_STEP - 1;
            const out = { ...n, subOffset: so, subLength: sl };
            if (type === "rhythm") out.length = 1;
            return out;
          }) : [];
          return base;
        }),
      annotations: Array.isArray(s.annotations)
        ? s.annotations
            .filter(a => a && typeof a.text === "string" && Array.isArray(a.noteIds))
            .map(a => {
              const noteIds = a.noteIds.filter(x => typeof x === "string");
              const mp = a.manualPlacement;
              const manualPlacement = (mp
                && typeof mp.anchorNoteId === "string"
                && Number.isFinite(mp.dx) && Number.isFinite(mp.dy)
                && noteIds.includes(mp.anchorNoteId))
                ? { anchorNoteId: mp.anchorNoteId, dx: mp.dx, dy: mp.dy }
                : null;
              const sw = Number.isFinite(a.shrunkWidth)
                ? Math.max(ANNOT_MIN_WIDTH, Math.min(ANNOT_MAX_WIDTH, a.shrunkWidth))
                : ANNOT_DEFAULT_SHRUNK_WIDTH;
              return { id: a.id || uid(), text: a.text, noteIds, shrunkWidth: sw, manualPlacement };
            })
        : [],
      // runtime/view state — never persisted, always defaulted
      selectedNoteIds: new Set(),
      selectedCell: null,
      partsPanelOpen: false,
      playStart: 0,
    };
  });
  return { name: typeof doc.name === "string" ? doc.name : "", sheets };
}

let persistTimer = null;
const SAVED_AT_KEY = "midi-editor:saved-at";
function formatSavedAt(ts) {
  const d = new Date(ts);

}
function updateSavedIndicator(ts) {
  const el = document.getElementById("saved-indicator");
  if (el) el.textContent = ts ? formatSavedAt(ts) : "Not saved yet";
}
function updateDocumentTitle() {
  document.title = project.name ? project.name : "Untitled project";
}
function syncProjectNameInput() {
  const inp = document.getElementById("project-name");
  if (inp) inp.value = project.name || "";

}
function writePersist() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(serializeProject(project)));

}
function persist() {
  if (persistTimer) return;

}

  if (!persistTimer) return;

      localStorage.removeItem(STORAGE_KEY);
      return;
    }
    const restored = deserializeProject(parsed);
    if (!restored) {
      localStorage.removeItem(STORAGE_KEY);
      return;
    }
    project.name = restored.name || "";
    project.sheets = restored.sheets;
    activeSheetId = project.sheets[0].id;
    lastFocusedSheetId = activeSheetId;
  } catch {
    localStorage.removeItem(STORAGE_KEY);
  }
})();

setTimeout(() => {
  const ts = parseInt(localStorage.getItem(SAVED_AT_KEY) || "", 10);
  updateSavedIndicator(Number.isFinite(ts) ? ts : null);
}, 0);
let playingSheetId = null;   // sheet actively producing sound
let pausedSheetId = null;    // sheet frozen mid-playback
let pausedStep = 0;            // step at which paused playback is frozen
let audioCtx = null;
let activeOscillators = [];
let playStopTimer = null;
let playbackRaf = null;
let playbackT0 = 0;
let playbackStartStep = 0;
let playbackSecPerStep = 0;

let recordingPartId = null;
let recordingState = "idle"; // "idle" | "count-in" | "recording"
let recordingT0 = 0;
let recordingStartStep = 0;
let recordingSecPerStep = 0;

// ---------- Pitch helpers ----------
function pitchName(midi) {
  const n = ((midi % 12) + 12) % 12;
  return PITCH_NAMES[n] + (Math.floor(midi / 12) - 1);
}
const DEGREE_NAMES = ["I","♭II","II","♭III","III","IV","♭V","V","♭VI","VI","♭VII","VII"];
function pitchDisplayName(midi, sheet, withOctave) {
  const octave = Math.floor(midi / 12) - 1;
  if (sheet.pitchDisplay === "degree") {
    const offset = (((midi - sheet.scale.root) % 12) + 12) % 12;
    return DEGREE_NAMES[offset] + (withOctave ? octave : "");
  }
  const pc = ((midi % 12) + 12) % 12;
  return PITCH_NAMES[pc] + (withOctave ? octave : "");
}
function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
